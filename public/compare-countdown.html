<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Font Compare — BATTLE FES 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Big+Shoulders+Stencil+Display:wght@700;900&family=Black+Ops+One&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'DSEG14 Modern';
    src: url('/assets/fonts/DSEG14Modern-Bold.woff2') format('woff2'),
         url('/assets/fonts/DSEG14Modern-Bold.woff') format('woff');
    font-weight: 700;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: linear-gradient(180deg, #060a1c 0%, #0a0d28 30%, #1e0912 70%, #140407 100%) fixed;
    color: #fff8ee;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.4em;
    color: rgba(255,200,140,0.7);
    margin: 2rem 0 1rem;
  }
  .panel-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.5em;
    color: rgba(255,200,140,0.85);
    text-align: center;
    margin: 1.6rem 0 0.4rem;
    padding-left: 0.5em;
  }
  .panel-sub {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    color: rgba(255,200,140,0.5);
    text-align: center;
    margin-bottom: 0.8rem;
  }

  /* === COUNTDOWN PANEL CSS (matches public/index.html) === */
  .vote-countdown {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
    padding: 4.5rem 1.5rem 3.4rem;
    margin: 0.6rem auto 2rem;
    width: calc(100% - 2rem);
    max-width: 1240px;
    isolation: isolate;
    overflow: hidden;
    background: #050203;
    border-radius: 4px;
  }
  .vote-countdown::before {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -45%;
    width: 130%;
    height: 110%;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at 50% 100%,
      rgba(255,140,50,0.24) 0%,
      rgba(255,90,20,0.13) 22%,
      rgba(140,40,8,0.06) 48%,
      transparent 75%);
    filter: blur(10px);
    z-index: 0;
    pointer-events: none;
    animation: cdRadialBreath 5.5s ease-in-out infinite;
  }
  .vote-countdown::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%,
      transparent 45%,
      rgba(0,0,0,0.4) 82%,
      rgba(0,0,0,0.78) 100%);
    z-index: 2;
    pointer-events: none;
  }
  .cd-frame {
    position: absolute;
    pointer-events: none;
    z-index: 2;
    left: 4%;
    right: 4%;
    height: 1px;
    background: linear-gradient(to right,
      transparent 0%,
      rgba(255,200,140,0.45) 25%,
      rgba(255,220,160,0.7) 50%,
      rgba(255,200,140,0.45) 75%,
      transparent 100%);
  }
  .cd-frame.top    { top: 1.4rem; }
  .cd-frame.bottom { bottom: 1.4rem; }
  .cd-frame::before, .cd-frame::after {
    content: '';
    position: absolute;
    top: -2px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,210,150,0.95) 0%, rgba(255,140,40,0) 70%);
  }
  .cd-frame::before { left: 0; }
  .cd-frame::after  { right: 0; }
  @keyframes cdRadialBreath {
    0%, 100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1.0;  transform: translateX(-50%) scale(1.06); }
  }
  .cd-content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.4rem;
    width: 100%;
  }
  .cd-eyebrow {
    margin: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.9rem, 1.4vw, 1.25rem);
    letter-spacing: 0.55em;
    color: rgba(255,200,140,0.78);
    text-shadow: 0 0 22px rgba(255,140,40,0.45);
    line-height: 1;
    padding-left: 0.55em;
    white-space: nowrap;
  }
  .cd-grid {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: clamp(0.5rem, 1.4vw, 1.6rem);
    margin: 0.5rem 0 0.6rem;
    width: 100%;
  }
  .cd-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
  }
  .cd-num {
    display: flex;
    align-items: center;
    gap: 0.06em;
    font-size: clamp(3.6rem, 11vw, 9rem);
    line-height: 1;
    letter-spacing: 0;
  }
  .cd-flap {
    position: relative;
    display: inline-block;
    width: 0.62em;
    height: 1em;
    perspective: 700px;
    vertical-align: top;
    color: transparent;
  }
  .cd-flap-half {
    position: absolute;
    left: 0; right: 0;
    height: 50%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    background: linear-gradient(180deg, #1c0d05 0%, #0a0503 100%);
    backface-visibility: hidden;
    font-size: inherit;
    font-family: inherit;
    font-weight: inherit;
  }
  .cd-flap-half.top {
    top: 0;
    align-items: flex-start;
    border-radius: 7px 7px 0 0;
    box-shadow:
      inset 0 1px 0 rgba(255,210,140,0.20),
      inset 0 -1px 0 rgba(0,0,0,0.85),
      inset 1px 0 0 rgba(255,180,80,0.08),
      inset -1px 0 0 rgba(255,180,80,0.08);
  }
  .cd-flap-half.bottom {
    bottom: 0;
    align-items: flex-end;
    border-radius: 0 0 7px 7px;
    box-shadow:
      inset 0 -1px 0 rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,180,80,0.16),
      inset 1px 0 0 rgba(255,180,80,0.08),
      inset -1px 0 0 rgba(255,180,80,0.08);
  }
  .cd-flap-half > span {
    display: block;
    line-height: 1em;
    font: inherit;
    background: linear-gradient(178deg,
      #ffffff 0%,
      #fff4c2 14%,
      #ffd866 32%,
      #ffae3d 55%,
      #ff7a1e 80%,
      #e83a14 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter:
      drop-shadow(0 0 22px rgba(255,150,40,0.4))
      drop-shadow(0 4px 12px rgba(0,0,0,0.7));
  }
  .cd-flap-half.flip { z-index: 2; }
  .cd-flap-half.top.flip {
    transform-origin: 50% 100%;
    transform: rotateX(0deg);
  }
  .cd-flap-half.bottom.flip {
    transform-origin: 50% 0%;
    transform: rotateX(90deg);
  }
  .cd-flap.flipping .cd-flap-half.top.flip {
    animation: flapTop 320ms cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
  }
  .cd-flap.flipping .cd-flap-half.bottom.flip {
    animation: flapBottom 320ms cubic-bezier(0.45, 0.05, 0.55, 0.95) 320ms forwards;
  }
  @keyframes flapTop {
    0%   { transform: rotateX(0deg);   filter: brightness(1); }
    100% { transform: rotateX(-90deg); filter: brightness(0.65); }
  }
  @keyframes flapBottom {
    0%   { transform: rotateX(90deg); filter: brightness(0.65); }
    100% { transform: rotateX(0deg);  filter: brightness(1); }
  }
  .cd-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.65rem, 1vw, 0.92rem);
    letter-spacing: 0.45em;
    color: rgba(255,180,90,0.7);
    text-shadow: 0 0 12px rgba(255,140,40,0.35);
    padding-left: 0.45em;
    line-height: 1;
  }
  .cd-sep {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0.55em;
    height: 1em;
    font-size: clamp(3.6rem, 11vw, 9rem);
    align-self: flex-start;
    margin-top: 0;
    animation: cdSepBlink 1.4s ease-in-out infinite;
  }
  .cd-sep i {
    display: block;
    width: 0.13em;
    height: 0.13em;
    border-radius: 50%;
    background: radial-gradient(circle,
      #fff0c0 0%,
      #ff9a30 55%,
      rgba(255,90,20,0) 100%);
    box-shadow:
      0 0 14px rgba(255,160,50,0.7),
      0 0 28px rgba(255,120,30,0.4);
  }
  @keyframes cdSepBlink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.32; }
  }

  /* ===== PER-FONT OVERRIDES ===== */
  .panel-a .cd-num, .panel-a .cd-sep {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-weight: 900;
  }
  .panel-a .cd-flap-half > span {
    font-family: 'Big Shoulders Stencil Display', sans-serif;
    font-weight: 900;
  }
  .panel-a .cd-flap { width: 0.62em; }

  .panel-b .cd-num, .panel-b .cd-sep {
    font-family: 'Black Ops One', sans-serif;
    font-weight: 400;
  }
  .panel-b .cd-flap-half > span {
    font-family: 'Black Ops One', sans-serif;
    font-weight: 400;
  }
  .panel-b .cd-flap { width: 0.66em; }

  .panel-c .cd-num, .panel-c .cd-sep {
    font-family: 'DSEG14 Modern', monospace;
    font-weight: 700;
    font-size: clamp(2.8rem, 8.5vw, 7rem);
  }
  .panel-c .cd-flap-half > span {
    font-family: 'DSEG14 Modern', monospace;
    font-weight: 700;
  }
  .panel-c .cd-flap { width: 0.95em; height: 1.05em; }
  .panel-c .cd-sep  { height: 1.05em; }
</style>
</head>
<body>

<h1>COUNTDOWN FONT COMPARE</h1>

<div class="panel-label">A. BIG SHOULDERS STENCIL DISPLAY 900</div>
<div class="panel-sub">産業ステンシル / 鉄道由来</div>
<div class="vote-countdown panel-a">
  <div class="cd-frame top"></div>
  <div class="cd-frame bottom"></div>
  <div class="cd-content">
    <p class="cd-eyebrow">BATTLE&nbsp;STARTS&nbsp;IN</p>
    <div class="cd-grid">
      <div class="cd-cell"><div class="cd-num" data-id="a-d"></div><div class="cd-label">DAYS</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="a-h"></div><div class="cd-label">HOURS</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="a-m"></div><div class="cd-label">MIN</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="a-s"></div><div class="cd-label">SEC</div></div>
    </div>
  </div>
</div>

<div class="panel-label">B. BLACK OPS ONE</div>
<div class="panel-sub">軍用ステンシル / アクション・FPS UI</div>
<div class="vote-countdown panel-b">
  <div class="cd-frame top"></div>
  <div class="cd-frame bottom"></div>
  <div class="cd-content">
    <p class="cd-eyebrow">BATTLE&nbsp;STARTS&nbsp;IN</p>
    <div class="cd-grid">
      <div class="cd-cell"><div class="cd-num" data-id="b-d"></div><div class="cd-label">DAYS</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="b-h"></div><div class="cd-label">HOURS</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="b-m"></div><div class="cd-label">MIN</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="b-s"></div><div class="cd-label">SEC</div></div>
    </div>
  </div>
</div>

<div class="panel-label">C. DSEG14 MODERN BOLD</div>
<div class="panel-sub">14セグLED / デジタルスコアボード</div>
<div class="vote-countdown panel-c">
  <div class="cd-frame top"></div>
  <div class="cd-frame bottom"></div>
  <div class="cd-content">
    <p class="cd-eyebrow">BATTLE&nbsp;STARTS&nbsp;IN</p>
    <div class="cd-grid">
      <div class="cd-cell"><div class="cd-num" data-id="c-d"></div><div class="cd-label">DAYS</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="c-h"></div><div class="cd-label">HOURS</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="c-m"></div><div class="cd-label">MIN</div></div>
      <div class="cd-sep"><i></i><i></i></div>
      <div class="cd-cell"><div class="cd-num" data-id="c-s"></div><div class="cd-label">SEC</div></div>
    </div>
  </div>
</div>

<div style="height:4rem"></div>

<script>
const VOTE_OPEN = '2026-07-18T20:45:00+09:00';

function buildFlapCell() {
  const cell = document.createElement('div');
  cell.className = 'cd-flap';
  cell.dataset.digit = '0';
  cell.innerHTML =
    '<div class="cd-flap-half top back"><span>0</span></div>' +
    '<div class="cd-flap-half bottom back"><span>0</span></div>' +
    '<div class="cd-flap-half top flip"><span>0</span></div>' +
    '<div class="cd-flap-half bottom flip"><span>0</span></div>';
  return cell;
}
function ensureFlapCells(numEl, count) {
  while (numEl.children.length < count) numEl.appendChild(buildFlapCell());
  while (numEl.children.length > count) numEl.removeChild(numEl.lastChild);
}
function setFlapDigit(cell, newDigit) {
  const oldDigit = cell.dataset.digit;
  if (oldDigit === newDigit) return;
  const halves = cell.children;
  const backTop    = halves[0].firstElementChild;
  const backBottom = halves[1].firstElementChild;
  const flipTop    = halves[2].firstElementChild;
  const flipBottom = halves[3].firstElementChild;
  if (cell.classList.contains('flipping')) {
    cell.classList.remove('flipping');
    backBottom.textContent = oldDigit;
    flipTop.textContent    = oldDigit;
    flipBottom.textContent = oldDigit;
  }
  backTop.textContent    = newDigit;
  flipTop.textContent    = oldDigit;
  flipBottom.textContent = newDigit;
  void cell.offsetWidth;
  cell.classList.add('flipping');
  const flipBottomEl = halves[3];
  const onEnd = (e) => {
    if (e.target !== flipBottomEl) return;
    flipBottomEl.removeEventListener('animationend', onEnd);
    backBottom.textContent = newDigit;
    flipTop.textContent    = newDigit;
    cell.classList.remove('flipping');
    cell.dataset.digit = newDigit;
  };
  flipBottomEl.addEventListener('animationend', onEnd);
}
function setNum(idAttr, value) {
  const el = document.querySelector(`[data-id="${idAttr}"]`);
  if (!el) return;
  const str = String(Math.max(0, value)).padStart(2, '0');
  ensureFlapCells(el, str.length);
  for (let i = 0; i < str.length; i++) setFlapDigit(el.children[i], str[i]);
}

function tick() {
  const target = new Date(VOTE_OPEN).getTime();
  const diff = Math.max(0, target - Date.now());
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);
  ['a','b','c'].forEach(p => {
    setNum(`${p}-d`, days);
    setNum(`${p}-h`, hours);
    setNum(`${p}-m`, mins);
    setNum(`${p}-s`, secs);
  });
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
