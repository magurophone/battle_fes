<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BATTLE FES Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060c1a;
      --bg2: #1e0912;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(13, 19, 38, 0.88);
      --panel-test: rgba(255, 124, 30, 0.12);
      --border: rgba(255, 124, 30, 0.22);
      --border-strong: rgba(255, 224, 64, 0.28);
      --accent: #ff7c1e;
      --accent2: #ffe040;
      --teal: #38d4ff;
      --danger: #ff5e6c;
      --text: #fff8ee;
      --muted: #c3a97f;
      --ok: #7ff2b1;
      --warn: #ffd56d;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      --focus-ring: 0 0 0 3px rgba(255, 124, 30, 0.24);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #060c1a 0%, #0d1530 30%, #150a21 70%, #1e0912 100%) fixed;
    }

    body {
      color: var(--text);
      font-family: "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.6;
      padding: 32px 18px 72px;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    h1, h2, h3, th, summary {
      font-family: "Bebas Neue", sans-serif;
      font-weight: 400;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      letter-spacing: 0.12em;
      text-shadow: 0 0 24px rgba(255, 124, 30, 0.26);
    }

    .hero {
      margin-bottom: 22px;
      padding: 20px 22px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(56, 212, 255, 0.16), transparent 34%),
        radial-gradient(circle at top left, rgba(255, 224, 64, 0.1), transparent 26%),
        rgba(7, 12, 24, 0.66);
      box-shadow: var(--shadow);
      text-align: center;          /* タイトル + サブタイトル中央揃え */
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
    }

    .row {
      margin-bottom: 18px;
    }

    .hidden {
      display: none !important;
    }

    .panel {
      margin-bottom: 18px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)),
        var(--panel-strong);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .panel.testmode {
      border-color: rgba(255, 224, 64, 0.28);
      background:
        radial-gradient(circle at right center, rgba(255, 224, 64, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255, 124, 30, 0.09), rgba(255, 124, 30, 0.03)),
        var(--panel-test);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.45rem;
      letter-spacing: 0.16em;
      color: var(--accent2);
    }

    h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    h3 small {
      font-family: "Noto Sans JP", system-ui, sans-serif;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-width: 0;
      padding: 12px 14px;
      color: var(--text);
      font: inherit;
      border-radius: 12px;
      border: 1px solid rgba(255, 124, 30, 0.28);
      background: rgba(8, 14, 29, 0.92);
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    input:hover {
      border-color: rgba(255, 224, 64, 0.4);
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--focus-ring);
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 124, 30, 0.34);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    button:hover {
      border-color: var(--accent2);
      box-shadow: 0 0 0 1px rgba(255, 224, 64, 0.12);
      transform: translateY(-1px);
    }

    button:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    button.primary {
      border-color: transparent;
      color: #1d0900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 24px rgba(255, 124, 30, 0.22);
    }

    button.primary:hover {
      box-shadow: 0 12px 30px rgba(255, 124, 30, 0.3);
    }

    button.danger {
      border-color: rgba(255, 94, 108, 0.45);
      color: #ffc2c8;
      background: rgba(255, 94, 108, 0.08);
    }

    button.danger:hover {
      border-color: var(--danger);
      color: #fff;
      background: rgba(255, 94, 108, 0.16);
    }

    .password-row,
    .admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .password-row input {
      flex: 1 1 280px;
    }

    .toggle-password-btn {
      min-width: 88px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .panel.testmode .status {
      color: var(--warn);
    }

    .lead {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(56, 212, 255, 0.18);
      background: rgba(56, 212, 255, 0.06);
    }

    .stat-card strong {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stat-card span {
      display: block;
      margin-top: 6px;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .category-block {
      margin-bottom: 18px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015)), rgba(9, 14, 26, 0.92);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .category-block > * {
      position: relative;
      z-index: 1;
    }

    .category-block::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--accent);
      z-index: 0;
    }

    .category-block.team::before {
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }

    .category-block.individual::before {
      background: linear-gradient(180deg, var(--teal), #b2f6ff);
    }

    /* カテゴリ見出しをバッジ風カードにして他要素と差別化 */
    .category-block h3 {
      display: block;
      width: fit-content;
      margin: 0 auto 16px;          /* バッジを横方向中央寄せ */
      padding: 8px 18px;
      font-size: 1.35rem;
      letter-spacing: 0.14em;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,124,30,0.22), rgba(255,224,64,0.10));
      border: 1px solid rgba(255,124,30,0.45);
      color: var(--accent);
      box-shadow: 0 4px 14px rgba(255,124,30,0.18);
      text-align: center;
    }
    .category-block.team h3 {
      background: linear-gradient(135deg, rgba(255,124,30,0.22), rgba(255,224,64,0.10));
      border-color: rgba(255,124,30,0.45);
      color: var(--accent);
      box-shadow: 0 4px 14px rgba(255,124,30,0.18);
    }
    .category-block.individual h3 {
      background: linear-gradient(135deg, rgba(56,212,255,0.22), rgba(178,246,255,0.10));
      border-color: rgba(56,212,255,0.45);
      color: var(--teal);
      box-shadow: 0 4px 14px rgba(56,212,255,0.18);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px 16px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.88rem;
      justify-items: center;
      text-align: center;
    }

    .meta-grid strong {
      color: var(--text);
    }
    .meta-grid div { white-space: nowrap; }

    /* PC: テーブルが横にはみ出した場合のスクロール用ラッパー */
    .table-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      overflow: hidden auto;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .table-scroll table {
      width: 100%;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    th,
    td {
      padding: 10px 12px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.92rem;
      white-space: nowrap;
    }
    /* th だけセンター揃え (中央寄せはヘッダーのみ) */
    th {
      text-align: center;
      color: var(--accent2);
      background: rgba(255, 124, 30, 0.12);
      letter-spacing: 0.06em;
      font-size: 0.95rem;
    }

    tbody td {
      text-align: left;
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* チーム名色分け (public 側 TEAM_DISPLAY と同色) */
    .team-tag { font-weight: 700; letter-spacing: 0.04em; }
    .team-tag[data-team="1"] { color: #ff2d78; }   /* CRIMSON */
    .team-tag[data-team="2"] { color: #7c3aff; }   /* NOVA */
    .team-tag[data-team="3"] { color: #ffd700; }   /* GOLDEN */

    /* 貫通 BONUS バッジ (ポイント列の値の右に固定位置で表示) */
    .bonus-mark {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 8px;
      font-family: "Bebas Neue", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: #1d0900;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 999px;
      vertical-align: middle;
    }

    /* ── モバイル時カードビュー (≤ 720px) ──
       PC ではテーブルのまま、スマホでは tr 単位でカード化して、
       長文コメント等を縦並び・自然な折り返しで読みやすくする */
    @media (max-width: 720px) {
      .table-scroll,
      .table-scroll table,
      .table-scroll thead,
      .table-scroll tbody,
      .table-scroll tr,
      .table-scroll td {
        display: block;
        width: 100%;
      }
      .table-scroll {
        overflow: visible;
        border: none;
        background: transparent;
        border-radius: 0;
      }
      /* thead は隠して各セルが自分でラベル表示 */
      .table-scroll thead {
        position: absolute;
        left: -9999px;
        clip: rect(0 0 0 0);
      }
      .table-scroll tr {
        margin-bottom: 12px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 124, 30, 0.18);
        border-radius: 12px;
      }
      .table-scroll tr:last-child {
        margin-bottom: 0;
      }
      .table-scroll td {
        white-space: normal;       /* カード化したので折り返し OK */
        text-align: left;
        padding: 4px 0;
        border-bottom: none;
        font-size: 0.9rem;
        position: relative;
        padding-left: 110px;        /* ラベル用スペース */
      }
      .table-scroll td::before {
        content: attr(data-label);
        position: absolute;
        left: 0;
        top: 4px;
        width: 100px;
        text-align: center;          /* カード内見出し中央揃え */
        color: var(--accent2);
        font-family: "Bebas Neue", sans-serif;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
      }
      /* 空行 (colspan="3" 等) はラベル無しで中央表示 */
      .table-scroll td[colspan] {
        padding-left: 0;
        text-align: center;
      }
      .table-scroll td[colspan]::before {
        content: none;
      }
    }

    details {
      margin-top: 14px;
    }

    summary {
      color: var(--accent2);
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      user-select: none;
    }

    summary:hover {
      color: var(--accent);
    }

    .empty {
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 12px 48px;
      }

      .hero,
      .panel,
      .category-block {
        padding: 16px;
        border-radius: 18px;
      }

      .password-row,
      .admin-actions {
        align-items: stretch;
      }

      .toggle-password-btn,
      .admin-actions button {
        width: 100%;
      }

      th,
      td {
        font-size: 0.86rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>BATTLE FES ADMIN</h1>
      <div class="subtitle">投票集計の確認、リセット、イベント感想の管理を行う管理画面です。</div>
    </header>

    <section id="loginPanel" class="panel row">
      <h2>管理者ログイン</h2>
      <p class="lead">管理者パスワードを入力してダッシュボードを開きます。</p>
      <label for="adminToken">管理者パスワード</label>
      <div class="password-row">
        <input id="adminToken" type="password" placeholder="管理者パスワードを入力" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false" aria-describedby="statusText">
        <button type="button" id="togglePwBtn" class="toggle-password-btn" onclick="togglePasswordVisibility()" aria-label="パスワードを表示" aria-pressed="false">表示</button>
      </div>
      <div class="admin-actions">
        <button type="button" id="loginBtn" class="primary" onclick="login()">ログイン</button>
      </div>
    </section>

    <section id="adminBar" class="panel row hidden">
      <h2>管理操作</h2>
      <div class="admin-actions">
        <button type="button" class="primary" onclick="loadAdmin()">再読み込み</button>
        <button type="button" class="danger" onclick="resetVotes()">投票をリセット</button>
        <button type="button" onclick="logout()">ログアウト</button>
      </div>
    </section>

    <div class="row">
      <span id="statusText" class="status" role="status" aria-live="polite"></span>
    </div>

    <section class="panel testmode row">
      <h2>テストモード</h2>
      <p class="lead">実投票画面の投票UIにテスト表示を反映します。APIの挙動は変えず、表示だけを切り替えます。</p>
      <div class="admin-actions">
        <button type="button" id="testModeToggleBtn" onclick="toggleTestMode()">テストモード OFF</button>
        <span id="testModeStatus" class="status"></span>
      </div>
    </section>

    <main id="dashboard" class="hidden">
      <section class="stats-row">
        <div class="stat-card">
          <strong>投票状態</strong>
          <span id="voteStatus">-</span>
        </div>
      </section>

      <div id="categoriesWrap"></div>

      <section class="panel">
        <h2>イベント感想</h2>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>時刻</th>
                <th>投票者</th>
                <th>コメント</th>
              </tr>
            </thead>
            <tbody id="eventImpressionsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const TEST_MODE_KEY = "battlefes_test_mode";
    const TOKEN_KEY = "battlefes_admin_token";

    let configCache = { categories: [], teams: [], members: [] };

    function setStatus(message) {
      document.getElementById("statusText").textContent = message || "";
    }

    function setLoggedInUi(isLoggedIn) {
      document.getElementById("loginPanel").classList.toggle("hidden", isLoggedIn);
      document.getElementById("adminBar").classList.toggle("hidden", !isLoggedIn);
      document.getElementById("dashboard").classList.toggle("hidden", !isLoggedIn);

      if (!isLoggedIn) {
        const input = document.getElementById("adminToken");
        input.type = "password";
        input.value = "";
        syncPasswordToggleUI(false);
      }
    }

    function syncPasswordToggleUI(isVisible) {
      const btn = document.getElementById("togglePwBtn");
      if (!btn) return;
      btn.textContent = isVisible ? "隠す" : "表示";
      btn.setAttribute("aria-label", isVisible ? "パスワードを隠す" : "パスワードを表示");
      btn.setAttribute("aria-pressed", isVisible ? "true" : "false");
    }

    function togglePasswordVisibility() {
      const input = document.getElementById("adminToken");
      if (!input) return;
      const nextVisible = input.type === "password";
      input.type = nextVisible ? "text" : "password";
      syncPasswordToggleUI(nextVisible);
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || "";
    }

    function clearToken() {
      localStorage.removeItem(TOKEN_KEY);
    }

    function isAuthError(error) {
      return error && (error.status === 401 || error.status === 403);
    }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = new Headers(options.headers || {});
      if (token) headers.set("Authorization", `Bearer ${token}`);

      const response = await fetch(path, { ...options, headers });
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        let message;
        if (response.status === 401) {
          message = "認証エラー: 管理者パスワードを確認してください";
        } else if (response.status === 403) {
          message = data.error || "アクセスが拒否されました";
        } else {
          message = data.error || `Request failed: ${response.status}`;
        }
        const err = new Error(message);
        err.status = response.status;
        err.data = data;
        throw err;
      }

      return data;
    }

    async function login() {
      const input = document.getElementById("adminToken");
      const candidate = input.value.trim();

      if (!candidate) {
        setStatus("管理者パスワードを入力してください");
        input.focus();
        return;
      }

      localStorage.setItem(TOKEN_KEY, candidate);
      setStatus("ログイン中...");

      try {
        await loadAdmin({ source: "login", successMessage: "ログインしました" });
        input.value = "";
      } catch (error) {
        if (isAuthError(error)) {
          clearToken();
          setLoggedInUi(false);
        }
        setStatus(error.message);
      }
    }

    function logout() {
      clearToken();
      setLoggedInUi(false);
      setStatus("ログアウトしました");
    }

    function isTestMode() {
      try {
        return localStorage.getItem(TEST_MODE_KEY) === "1";
      } catch (error) {
        return false;
      }
    }

    function refreshTestModeUI() {
      const on = isTestMode();
      const btn = document.getElementById("testModeToggleBtn");
      const status = document.getElementById("testModeStatus");

      if (btn) {
        btn.textContent = on ? "テストモード ON" : "テストモード OFF";
        btn.classList.toggle("primary", on);
      }

      if (status) {
        status.textContent = on
          ? "テスト表示が有効です。投票UIに補助表示を反映します。"
          : "通常表示です。";
      }
    }

    function toggleTestMode() {
      try {
        if (isTestMode()) {
          localStorage.removeItem(TEST_MODE_KEY);
        } else {
          localStorage.setItem(TEST_MODE_KEY, "1");
        }
      } catch (error) {
        setStatus("TEST MODE の切り替えに失敗しました");
        return;
      }

      refreshTestModeUI();
      setStatus(isTestMode() ? "TEST MODE を ON にしました" : "TEST MODE を OFF にしました");
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>\"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    // 日時表示用ヘルパ: 本番は 7/18 の単日イベントなので時刻のみで一意に識別できる
    function formatJstTime(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    /* ── 時間加重ポイント計算 (public 側 VOTE POWER と同一仕様) ──
       受付開始 100PT → 本投票直前 5000PT への線形上昇。
       VOTE_OPEN / VOTE_CLOSE は functions/api/_lib/vote-store.js と同期必須。 */
    const VOTE_OPEN_ISO  = "2026-07-18T20:45:00+09:00";
    const VOTE_CLOSE_ISO = "2026-07-18T22:25:00+09:00";
    const VP_MIN = 100;
    const VP_MAX = 5000;

    function calcVotePoint(iso) {
      if (!iso) return VP_MIN;
      const t = new Date(iso).getTime();
      if (isNaN(t)) return VP_MIN;
      const open  = new Date(VOTE_OPEN_ISO).getTime();
      const close = new Date(VOTE_CLOSE_ISO).getTime();
      if (t <= open)  return VP_MIN;
      if (t >= close) return VP_MAX;
      const progress = (t - open) / (close - open);
      return Math.round(VP_MIN + (VP_MAX - VP_MIN) * progress);
    }

    function teamName(id) {
      const team = configCache.teams.find((entry) => Number(entry.id) === Number(id));
      return team ? team.name : `team#${id}`;
    }

    function memberName(id) {
      const member = configCache.members.find((entry) => Number(entry.id) === Number(id));
      if (!member) return `member#${id}`;
      return `${member.name} (${teamName(member.teamId)})`;
    }

    function candidateName(category, candidateId) {
      if (!category) return String(candidateId);
      if (category.candidateType === "team") return teamName(candidateId);
      if (category.candidateType === "member") return memberName(candidateId);
      return String(candidateId);
    }

    /* ── チーム色付き表示用 HTML ヘルパ (public 側 TEAM_DISPLAY と同色) ──
       戻り値はサニタイズ済み HTML 断片。innerHTML に直接埋めて OK。 */
    function teamTagHtml(teamId) {
      const id = Number(teamId);
      const team = configCache.teams.find((entry) => Number(entry.id) === id);
      const name = team ? team.name : `team#${teamId}`;
      return `<span class="team-tag" data-team="${id}">${escapeHtml(name)}</span>`;
    }

    function candidateHtml(category, candidateId) {
      if (!category) return escapeHtml(String(candidateId));
      if (category.candidateType === "team") return teamTagHtml(candidateId);
      if (category.candidateType === "member") {
        const member = configCache.members.find((entry) => Number(entry.id) === Number(candidateId));
        if (!member) return escapeHtml(`member#${candidateId}`);
        return `${escapeHtml(member.name)} (${teamTagHtml(member.teamId)})`;
      }
      return escapeHtml(String(candidateId));
    }

    function syncResponsiveTableLabels(root = document) {
      root.querySelectorAll(".table-scroll table").forEach((table) => {
        const headers = Array.from(table.querySelectorAll("thead th")).map((th) => th.textContent.trim());
        if (!headers.length) return;

        table.querySelectorAll("tbody tr").forEach((row) => {
          Array.from(row.cells).forEach((cell, index) => {
            if (cell.hasAttribute("colspan")) {
              cell.removeAttribute("data-label");
              return;
            }

            const label = headers[index] || "";
            if (label) {
              cell.setAttribute("data-label", label);
            } else {
              cell.removeAttribute("data-label");
            }
          });
        });
      });
    }

    function renderCategoryBlock(category, payload) {
      const results = payload && payload.results ? payload.results : { counts: {}, totalVotes: 0, updatedAt: null };
      const meta = payload && payload.meta ? payload.meta : { totalSubmissions: 0, lastVoteAt: null };
      const voteLog = Array.isArray(payload && payload.voteLog) ? payload.voteLog : [];
      const uniqueFingerprints = Number(payload && payload.uniqueFingerprints) || 0;
      const counts = results.counts || {};
      const totalVotes = Number(results.totalVotes) || 0;
      const orderedIds = Array.isArray(category.candidateIds) && category.candidateIds.length
        ? category.candidateIds
        : Object.keys(counts).map((id) => Number(id));

      // 優勝チーム投票のみ、各候補の投票ポイントを timestamp から再計算
      const isTeamCategory = category.id === "team";
      const pointsByCandidate = {};
      let totalPoints = 0;
      if (isTeamCategory) {
        for (const id of orderedIds) pointsByCandidate[id] = 0;
        for (const entry of voteLog) {
          const cid = Number(entry.candidateId);
          const pt = calcVotePoint(entry.timestamp);
          pointsByCandidate[cid] = (pointsByCandidate[cid] || 0) + pt;
          totalPoints += pt;
        }
      }

      const rows = orderedIds.map((id) => {
        const votes = Number(counts[id] || 0);
        const percent = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
        if (isTeamCategory) {
          const pts = pointsByCandidate[id] || 0;
          return `
            <tr>
              <td data-label="候補">${candidateHtml(category, id)}</td>
              <td data-label="投票数">${votes}</td>
              <td data-label="投票ポイント">${pts.toLocaleString()}</td>
              <td data-label="割合">${percent}%</td>
            </tr>
          `;
        }
        return `
          <tr>
            <td data-label="候補">${candidateHtml(category, id)}</td>
            <td data-label="投票数">${votes}</td>
            <td data-label="割合">${percent}%</td>
          </tr>
        `;
      }).join("");

      const logRows = voteLog.map((entry) => {
        let ptCell = "";
        if (isTeamCategory) {
          // entry.votePoint / entry.bonusPoint は backend が保存。旧データは calcVotePoint() でフォールバック
          const vp = Number.isFinite(Number(entry.votePoint)) ? Number(entry.votePoint) : calcVotePoint(entry.timestamp);
          const bp = Number(entry.bonusPoint) || 0;
          const total = vp + bp;
          const badge = bp > 0 ? '<span class="bonus-mark">BONUS</span>' : "";
          ptCell = `<td data-label="ポイント">${total.toLocaleString()}${badge}</td>`;
        }
        return `
          <tr>
            <td data-label="時刻">${escapeHtml(formatJstTime(entry.timestamp))}</td>
            <td data-label="候補">${candidateHtml(category, entry.candidateId)}</td>
            <td data-label="投票者">${escapeHtml(entry.voterName || "-")}</td>
            ${ptCell}
            <td data-label="コメント">${escapeHtml(entry.comment || "")}</td>
          </tr>
        `;
      }).join("");

      const tableHead = isTeamCategory
        ? `<tr><th>候補</th><th>投票数</th><th>投票ポイント</th><th>割合</th></tr>`
        : `<tr><th>候補</th><th>投票数</th><th>割合</th></tr>`;
      const tableEmptyCols = isTeamCategory ? 4 : 3;

      const logHead = isTeamCategory
        ? `<tr><th>時刻</th><th>候補</th><th>投票者</th><th>ポイント</th><th>コメント</th></tr>`
        : `<tr><th>時刻</th><th>候補</th><th>投票者</th><th>コメント</th></tr>`;
      const logEmptyCols = isTeamCategory ? 5 : 4;

      const teamPointRow = isTeamCategory
        ? `<div><strong>総ポイント:</strong> ${totalPoints.toLocaleString()}</div>
           <div><strong>ライブスコア:</strong> 未入力</div>
           <div><strong>総合スコア:</strong> ${totalPoints.toLocaleString()} <small style="color:var(--muted);">(+ライブスコア)</small></div>`
        : "";

      return `
        <section class="category-block ${escapeHtml(category.type || "")}">
          <h3>${escapeHtml(category.label)}</h3>
          <div class="meta-grid">
            <div><strong>総投票数:</strong> ${totalVotes}</div>
            <div><strong>ユニーク端末:</strong> ${uniqueFingerprints}</div>
            <div><strong>最終投票:</strong> ${escapeHtml(formatJstTime(meta.lastVoteAt))}</div>
            ${teamPointRow}
          </div>
          <div class="table-scroll">
            <table>
              <thead>${tableHead}</thead>
              <tbody>${rows || `<tr><td colspan="${tableEmptyCols}" class="empty">データがありません</td></tr>`}</tbody>
            </table>
          </div>
          <details>
            <summary>投票ログ (${voteLog.length})</summary>
            <div class="table-scroll">
              <table>
                <thead>${logHead}</thead>
                <tbody>${logRows || `<tr><td colspan="${logEmptyCols}" class="empty">ログがありません</td></tr>`}</tbody>
              </table>
            </div>
          </details>
        </section>
      `;
    }

    function renderSnapshot(data) {
      configCache = data.config || { categories: [], teams: [], members: [] };

      document.getElementById("voteStatus").textContent = data.status || "-";

      const categories = Array.isArray(configCache.categories) ? configCache.categories : [];
      const categoriesData = data.categories || {};
      document.getElementById("categoriesWrap").innerHTML = categories
        .map((category) => renderCategoryBlock(category, categoriesData[category.id]))
        .join("");

      const impressions = Array.isArray(data.eventImpressions) ? data.eventImpressions : [];
      document.getElementById("eventImpressionsBody").innerHTML = impressions.length
        ? impressions.map((entry) => `
            <tr>
              <td data-label="時刻">${escapeHtml(formatJstTime(entry.timestamp))}</td>
              <td data-label="投票者">${escapeHtml(entry.voterName || "-")}</td>
              <td data-label="コメント">${escapeHtml(entry.comment || "")}</td>
            </tr>
          `).join("")
        : '<tr><td colspan="3" class="empty">感想はまだありません</td></tr>';
    }

    async function loadAdmin(options = {}) {
      try {
        const data = await api("/api/admin/results");
        renderSnapshot(data);
        setLoggedInUi(true);
        setStatus(options.successMessage || "管理者データを再読み込みしました");
        return data;
      } catch (error) {
        if (isAuthError(error)) {
          clearToken();
          setLoggedInUi(false);
        }
        setStatus(error.message);
        throw error;
      }
    }

    async function resetVotes() {
      const confirmed = window.confirm("すべての投票データとログをリセットします。本当に実行しますか？");
      if (!confirmed) return;

      try {
        const data = await api("/api/admin/reset", { method: "POST" });
        renderSnapshot(data);
        setLoggedInUi(true);
        setStatus("すべての投票をリセットしました");
      } catch (error) {
        if (isAuthError(error)) {
          clearToken();
          setLoggedInUi(false);
        }
        setStatus(error.message);
      }
    }

    function initialize() {
      syncPasswordToggleUI(false);
      refreshTestModeUI();
      setLoggedInUi(false);

      const token = getToken();
      if (token) {
        loadAdmin({ source: "restore", successMessage: "保存済みトークンで管理者データを再読み込みしました" }).catch(() => {});
      }
    }

    window.addEventListener("storage", (event) => {
      if (!event.key || event.key === TEST_MODE_KEY) {
        refreshTestModeUI();
      }
      if (!event.key || event.key === TOKEN_KEY) {
        if (getToken()) {
          loadAdmin({ source: "storage-sync" }).catch(() => {});
        } else {
          setLoggedInUi(false);
          setStatus("別タブでログアウトされました");
        }
      }
    });

    initialize();
  </script>
</body>
</html>
