<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BATTLE FES Admin</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 24px;
      line-height: 1.5;
      color: #1c1c1c;
      background: #fff;
    }
    h1 { margin-top: 0; }
    h2 {
      margin-top: 32px;
      border-bottom: 2px solid #ccc;
      padding-bottom: 4px;
    }
    h3 { margin-top: 24px; }
    button {
      padding: 10px 14px;
      cursor: pointer;
    }
    input {
      padding: 10px;
      width: min(420px, 100%);
    }
    .row { margin-bottom: 16px; }
    .hidden { display: none; }
    .status {
      display: inline-block;
      margin-left: 12px;
      color: #444;
    }
    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow: auto;
      max-height: 400px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 960px;
      margin-bottom: 16px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f0f0f0; }
    .category-block {
      border-left: 4px solid #888;
      padding: 8px 16px;
      margin: 16px 0;
      background: #fafafa;
    }
    .category-block.team { border-left-color: #ff6b1a; }
    .category-block.individual { border-left-color: #5b9eff; }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 4px 16px;
      font-size: 0.92em;
      color: #555;
      margin-bottom: 8px;
    }
    .meta-grid strong { color: #1c1c1c; }
    details { margin-top: 12px; }
    summary { cursor: pointer; }
  </style>
</head>
<body>
  <h1>BATTLE FES Admin</h1>

  <div class="row">
    <label for="adminToken">Admin password</label><br>
    <input id="adminToken" type="password" placeholder="管理画面パスワード">
    <button type="button" onclick="saveToken()">Log in</button>
    <button type="button" onclick="loadAdmin()">Load status</button>
  </div>

  <div class="row">
    <button type="button" onclick="resetVotes()">Reset all votes</button>
    <span id="statusText" class="status"></span>
  </div>

  <div class="row" style="border:1px dashed #f08c2a; padding:10px 14px; border-radius:8px; background:#fff8ef;">
    <strong style="color:#c4651a;">テストモード</strong>
    <span style="font-size:0.85em; color:#555; margin-left:8px;">
      ONにするとこの端末だけ投票期間外でも投票UIが開放されます（API側は waiting 状態を許可済み）
    </span>
    <div style="margin-top:8px;">
      <button type="button" id="testModeToggleBtn" onclick="toggleTestMode()">テストモード OFF</button>
      <span id="testModeStatus" class="status"></span>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="row"><strong>Vote status:</strong> <span id="voteStatus"></span></div>

    <div id="categoriesWrap"></div>

    <h2>イベント全体感想ログ</h2>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Name</th>
          <th>Comment</th>
        </tr>
      </thead>
      <tbody id="eventImpressionsBody"></tbody>
    </table>

    <h2>Raw JSON</h2>
    <pre id="rawJson"></pre>
  </div>

  <script>
    let configCache = { categories: [], teams: [], members: [] };

    function setStatus(message) {
      document.getElementById('statusText').textContent = message || '';
    }

    const TEST_MODE_KEY = 'battlefes_test_mode';

    function isTestMode() {
      try { return localStorage.getItem(TEST_MODE_KEY) === '1'; } catch (e) { return false; }
    }

    function refreshTestModeUI() {
      const on = isTestMode();
      const btn = document.getElementById('testModeToggleBtn');
      const status = document.getElementById('testModeStatus');
      if (btn) btn.textContent = on ? 'テストモード ON（クリックで OFF）' : 'テストモード OFF（クリックで ON）';
      if (btn) btn.style.background = on ? '#ff9933' : '';
      if (btn) btn.style.color = on ? '#fff' : '';
      if (status) status.textContent = on
        ? 'この端末では投票UIが期間外でも開放されます'
        : '通常モード（時間ゲートが有効）';
    }

    function toggleTestMode() {
      try {
        if (isTestMode()) localStorage.removeItem(TEST_MODE_KEY);
        else localStorage.setItem(TEST_MODE_KEY, '1');
      } catch (e) {}
      refreshTestModeUI();
      setStatus(isTestMode() ? 'TEST MODE を ON にしました' : 'TEST MODE を OFF にしました');
    }

    function getToken() {
      return localStorage.getItem('battlefes_admin_token') || '';
    }

    function saveToken() {
      const token = document.getElementById('adminToken').value.trim();
      if (token) {
        localStorage.setItem('battlefes_admin_token', token);
        setStatus('パスワードをこのブラウザに保存しました');
        return;
      }
      localStorage.removeItem('battlefes_admin_token');
      setStatus('保存済みパスワードをクリアしました');
    }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = new Headers(options.headers || {});
      if (token) headers.set('Authorization', `Bearer ${token}`);

      const response = await fetch(path, { ...options, headers });
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error('認証エラー: パスワードを確認してください');
        }
        if (response.status === 403) {
          throw new Error(data.error || 'アクセスが拒否されました');
        }
        throw new Error(data.error || `Request failed: ${response.status}`);
      }

      return data;
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function teamName(id) {
      const team = configCache.teams.find((entry) => Number(entry.id) === Number(id));
      return team ? team.name : `team#${id}`;
    }

    function memberName(id) {
      const member = configCache.members.find((entry) => Number(entry.id) === Number(id));
      if (!member) return `member#${id}`;
      return `${member.name}（${teamName(member.teamId)}）`;
    }

    function candidateName(category, candidateId) {
      if (!category) return String(candidateId);
      if (category.candidateType === 'team') return teamName(candidateId);
      if (category.candidateType === 'member') return memberName(candidateId);
      return String(candidateId);
    }

    function renderCategoryBlock(category, payload) {
      const results = payload && payload.results
        ? payload.results
        : { counts: {}, totalVotes: 0, updatedAt: null };
      const meta = payload && payload.meta
        ? payload.meta
        : { totalSubmissions: 0, lastVoteAt: null };
      const voteLog = Array.isArray(payload && payload.voteLog) ? payload.voteLog : [];
      const uniqueFingerprints = Number(payload && payload.uniqueFingerprints) || 0;
      const counts = results.counts || {};
      const totalVotes = Number(results.totalVotes) || 0;
      const orderedIds = Array.isArray(category.candidateIds) && category.candidateIds.length
        ? category.candidateIds
        : Object.keys(counts).map((id) => Number(id));

      const rows = orderedIds.map((id) => {
        const votes = Number(counts[id] || 0);
        const percent = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
        return `<tr>
          <td>${escapeHtml(candidateName(category, id))}</td>
          <td>${votes}</td>
          <td>${percent}%</td>
        </tr>`;
      }).join('');

      const logRows = voteLog.map((entry) => `<tr>
        <td>${escapeHtml(entry.timestamp || '-')}</td>
        <td>${escapeHtml(candidateName(category, entry.candidateId))}</td>
        <td>${escapeHtml(entry.voterName || '-')}</td>
        <td>${escapeHtml(entry.comment || '')}</td>
      </tr>`).join('');

      return `
        <div class="category-block ${escapeHtml(category.type || '')}">
          <h3>${escapeHtml(category.label)} <small style="color:#888;">[${escapeHtml(category.id)} / ${escapeHtml(category.type)}]</small></h3>
          <div class="meta-grid">
            <div><strong>Total votes:</strong> ${totalVotes}</div>
            <div><strong>Unique fingerprints:</strong> ${uniqueFingerprints}</div>
            <div><strong>Total submissions:</strong> ${Number(meta.totalSubmissions) || 0}</div>
            <div><strong>Updated at:</strong> ${escapeHtml(results.updatedAt || '-')}</div>
            <div><strong>Last vote at:</strong> ${escapeHtml(meta.lastVoteAt || '-')}</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Candidate</th>
                <th>Votes</th>
                <th>Percent</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="3" style="text-align:center;color:#888;">候補なし</td></tr>'}</tbody>
          </table>
          <details>
            <summary>Vote Log（${voteLog.length}件）</summary>
            <table>
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Candidate</th>
                  <th>Name</th>
                  <th>Comment</th>
                </tr>
              </thead>
              <tbody>${logRows || '<tr><td colspan="4" style="text-align:center;color:#888;">ログなし</td></tr>'}</tbody>
            </table>
          </details>
        </div>
      `;
    }

    function renderSnapshot(data) {
      configCache = data.config || { categories: [], teams: [], members: [] };

      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('voteStatus').textContent = data.status || '-';

      const categories = Array.isArray(configCache.categories) ? configCache.categories : [];
      const categoriesData = data.categories || {};
      document.getElementById('categoriesWrap').innerHTML = categories
        .map((category) => renderCategoryBlock(category, categoriesData[category.id]))
        .join('');

      const impressions = Array.isArray(data.eventImpressions) ? data.eventImpressions : [];
      document.getElementById('eventImpressionsBody').innerHTML = impressions.length
        ? impressions.map((entry) => `<tr>
            <td>${escapeHtml(entry.timestamp || '-')}</td>
            <td>${escapeHtml(entry.voterName || '-')}</td>
            <td>${escapeHtml(entry.comment || '')}</td>
          </tr>`).join('')
        : '<tr><td colspan="3" style="text-align:center;color:#888;">感想なし</td></tr>';

      document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
    }

    async function loadAdmin() {
      try {
        const data = await api('/api/admin/results');
        renderSnapshot(data);
        setStatus('読み込み完了');
      } catch (error) {
        setStatus(error.message);
      }
    }

    async function resetVotes() {
      const confirmed = window.confirm('すべての投票データとログをリセットします。元に戻せません。よろしいですか？');
      if (!confirmed) return;

      try {
        const data = await api('/api/admin/reset', { method: 'POST' });
        renderSnapshot(data);
        setStatus('すべての投票をリセットしました');
      } catch (error) {
        setStatus(error.message);
      }
    }

    document.getElementById('adminToken').value = getToken();
    window.addEventListener('storage', (event) => {
      if (!event.key || event.key === TEST_MODE_KEY) refreshTestModeUI();
    });
    refreshTestModeUI();
  </script>
</body>
</html>
