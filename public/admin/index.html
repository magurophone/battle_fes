<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BATTLE FES Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060c1a;
      --bg2: #0a1028;
      --panel: rgba(255,255,255,0.04);
      --border: rgba(255,160,60,0.22);
      --accent: #ff7c1e;
      --accent2: #ffe040;
      --accent3: #ff4455;
      --teal: #38d4ff;
      --text: #fff8ee;
      --muted: #b09870;
      --ok: #5eda9a;
      --warn: #ffb84a;
      --err: #ff7388;
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); }
    body {
      font-family: 'Noto Sans JP', system-ui, sans-serif;
      margin: 0;
      padding: 36px 28px 80px;
      line-height: 1.55;
      color: var(--text);
      background: linear-gradient(180deg, #060c1a 0%, #0a1028 35%, #120926 70%, #1e0912 100%) fixed;
      min-height: 100vh;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.16em;
      margin: 0 0 4px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255,124,30,0.35);
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      margin-bottom: 28px;
    }
    h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.18em;
      color: var(--accent2);
      border-bottom: 1px solid var(--border);
      padding: 0 0 6px;
      margin: 36px 0 14px;
    }
    h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      margin: 0 0 8px;
      color: var(--text);
    }
    h3 small { font-family: 'Noto Sans JP', sans-serif; font-size: 0.7rem; font-weight: 400; }
    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    button {
      background: rgba(10,16,40,0.7);
      border: 1px solid rgba(255,160,60,0.45);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 9px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.16s;
    }
    button:hover { border-color: var(--accent); background: rgba(255,140,40,0.16); color: var(--accent); }
    button:active { transform: translateY(1px); }
    button.primary {
      background: linear-gradient(135deg, #ff8c1a, #ff3344);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,107,26,0.35);
    }
    button.primary:hover { color: #fff; box-shadow: 0 6px 22px rgba(255,107,26,0.5); }
    button.danger {
      border-color: rgba(255,68,85,0.55);
      color: #ffb0bb;
    }
    button.danger:hover { border-color: var(--accent3); background: rgba(255,68,85,0.14); color: var(--accent3); }
    input {
      background: rgba(10,16,40,0.55);
      border: 1px solid rgba(255,160,60,0.25);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      width: min(420px, 100%);
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(255,124,30,0.18);
    }
    .password-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: min(520px, 100%);
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .password-row input { flex: 1 1 280px; min-width: 0; }
    .toggle-password-btn { min-width: 76px; }
    .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .row { margin-bottom: 18px; }
    .hidden { display: none !important; }
    .status {
      display: inline-block;
      font-size: 0.86rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .panel.testmode {
      border-color: rgba(255,140,60,0.45);
      background: rgba(255,140,60,0.08);
    }
    .panel.testmode strong { color: var(--accent); letter-spacing: 0.08em; }
    .panel.testmode .desc { font-size: 0.82rem; color: var(--muted); margin: 4px 0 10px; }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 960px;
      margin-bottom: 12px;
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid rgba(255,160,60,0.12);
      padding: 9px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }
    th {
      background: rgba(255,160,60,0.12);
      color: var(--accent2);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.12em;
      font-weight: 400;
    }
    tr:last-child td { border-bottom: none; }

    .category-block {
      border-left: 4px solid var(--muted);
      background: var(--panel);
      border-radius: 0 12px 12px 0;
      padding: 14px 20px;
      margin: 16px 0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    }
    .category-block.team { border-left-color: var(--accent); }
    .category-block.individual { border-left-color: var(--teal); }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px 18px;
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .meta-grid strong { color: var(--text); }

    details { margin-top: 14px; }
    summary {
      cursor: pointer;
      color: var(--accent2);
      font-size: 0.86rem;
      letter-spacing: 0.06em;
      padding: 4px 0;
    }
    summary:hover { color: var(--accent); }

    @media (max-width: 600px) {
      body { padding: 24px 14px 60px; }
      h1 { font-size: 1.9rem; }
      .panel { padding: 14px; }
      table { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <h1>BATTLE FES ADMIN</h1>
  <div class="subtitle">運営コンソール — リスナー投票結果と感想ログ</div>

  <div id="loginPanel" class="panel row">
    <label for="adminToken">Admin Password</label>
    <div class="password-row">
      <input id="adminToken" type="password" placeholder="管理画面パスワード" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false" aria-describedby="statusText">
      <button type="button" id="togglePwBtn" class="toggle-password-btn" onclick="togglePasswordVisibility()" aria-label="パスワードを表示" aria-pressed="false">表示</button>
    </div>
    <div class="admin-actions">
      <button type="button" class="primary" id="loginBtn" onclick="login()">ログイン</button>
    </div>
  </div>

  <div id="adminBar" class="panel row hidden">
    <div class="admin-actions">
      <button type="button" class="primary" onclick="loadAdmin()">再読み込み</button>
      <button type="button" class="danger" onclick="resetVotes()">投票データをリセット</button>
      <button type="button" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div class="row">
    <span id="statusText" class="status" role="status" aria-live="polite"></span>
  </div>

  <div class="panel testmode row">
    <strong>テストモード</strong>
    <div class="desc">ONにするとこの端末だけ投票期間外でも投票UIが開放されます（API側は waiting 状態を許可済み）</div>
    <div class="admin-actions">
      <button type="button" id="testModeToggleBtn" onclick="toggleTestMode()">テストモード OFF</button>
      <span id="testModeStatus" class="status"></span>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="row"><strong>Vote status:</strong> <span id="voteStatus"></span></div>

    <div id="categoriesWrap"></div>

    <h2>イベント全体感想ログ</h2>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Name</th>
          <th>Comment</th>
        </tr>
      </thead>
      <tbody id="eventImpressionsBody"></tbody>
    </table>
  </div>

  <script>
    let configCache = { categories: [], teams: [], members: [] };

    function setStatus(message) {
      document.getElementById('statusText').textContent = message || '';
    }

    function syncPasswordToggleUI(isVisible) {
      const btn = document.getElementById('togglePwBtn');
      if (!btn) return;
      btn.textContent = isVisible ? '隠す' : '表示';
      btn.setAttribute('aria-label', isVisible ? 'パスワードを隠す' : 'パスワードを表示');
      btn.setAttribute('aria-pressed', isVisible ? 'true' : 'false');
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('adminToken');
      if (!input) return;
      const isVisible = input.type !== 'password';
      input.type = isVisible ? 'password' : 'text';
      syncPasswordToggleUI(!isVisible);
    }

    const TEST_MODE_KEY = 'battlefes_test_mode';

    function isTestMode() {
      try { return localStorage.getItem(TEST_MODE_KEY) === '1'; } catch (e) { return false; }
    }

    function refreshTestModeUI() {
      const on = isTestMode();
      const btn = document.getElementById('testModeToggleBtn');
      const status = document.getElementById('testModeStatus');
      if (btn) btn.textContent = on ? 'テストモード ON（クリックで OFF）' : 'テストモード OFF（クリックで ON）';
      if (btn) btn.style.background = on ? '#ff9933' : '';
      if (btn) btn.style.color = on ? '#fff' : '';
      if (status) status.textContent = on
        ? 'この端末では投票UIが期間外でも開放されます'
        : '通常モード（時間ゲートが有効）';
    }

    function toggleTestMode() {
      try {
        if (isTestMode()) localStorage.removeItem(TEST_MODE_KEY);
        else localStorage.setItem(TEST_MODE_KEY, '1');
      } catch (e) {}
      refreshTestModeUI();
      setStatus(isTestMode() ? 'TEST MODE を ON にしました' : 'TEST MODE を OFF にしました');
    }

    function getToken() {
      return localStorage.getItem('battlefes_admin_token') || '';
    }

    function setLoggedInUi(isLoggedIn) {
      document.getElementById('loginPanel').classList.toggle('hidden', isLoggedIn);
      document.getElementById('adminBar').classList.toggle('hidden', !isLoggedIn);
      document.getElementById('dashboard').classList.toggle('hidden', !isLoggedIn);
      if (!isLoggedIn) {
        // パスワード欄は表示状態をリセット (toggle ボタン文言も同期)
        const input = document.getElementById('adminToken');
        if (input) input.type = 'password';
        syncPasswordToggleUI(false);
      }
    }

    async function login() {
      const input = document.getElementById('adminToken');
      const typed = input.value.trim();
      // 入力欄が空なら保存済みトークンで再検証する
      const candidate = typed || getToken();
      if (!candidate) {
        setStatus('パスワードを入力してください');
        input.focus();
        return;
      }
      // 入力中のものを先に保存して api() に拾わせる
      localStorage.setItem('battlefes_admin_token', candidate);
      setStatus('ログイン中...');
      try {
        const data = await api('/api/admin/results');
        renderSnapshot(data);
        setLoggedInUi(true);
        setStatus('ログインしました');
        input.value = ''; // 入力欄に平文を残さない
      } catch (error) {
        // 認証失敗時は保存したトークンを破棄して使い回しを防ぐ
        if (/認証エラー|アクセスが拒否/.test(error.message)) {
          localStorage.removeItem('battlefes_admin_token');
        }
        setStatus(error.message);
      }
    }

    function logout() {
      localStorage.removeItem('battlefes_admin_token');
      setLoggedInUi(false);
      setStatus('ログアウトしました');
    }

    async function api(path, options = {}) {
      const token = getToken();
      const headers = new Headers(options.headers || {});
      if (token) headers.set('Authorization', `Bearer ${token}`);

      const response = await fetch(path, { ...options, headers });
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        if (response.status === 401) {
          throw new Error('認証エラー: パスワードを確認してください');
        }
        if (response.status === 403) {
          throw new Error(data.error || 'アクセスが拒否されました');
        }
        throw new Error(data.error || `Request failed: ${response.status}`);
      }

      return data;
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function teamName(id) {
      const team = configCache.teams.find((entry) => Number(entry.id) === Number(id));
      return team ? team.name : `team#${id}`;
    }

    function memberName(id) {
      const member = configCache.members.find((entry) => Number(entry.id) === Number(id));
      if (!member) return `member#${id}`;
      return `${member.name}（${teamName(member.teamId)}）`;
    }

    function candidateName(category, candidateId) {
      if (!category) return String(candidateId);
      if (category.candidateType === 'team') return teamName(candidateId);
      if (category.candidateType === 'member') return memberName(candidateId);
      return String(candidateId);
    }

    function renderCategoryBlock(category, payload) {
      const results = payload && payload.results
        ? payload.results
        : { counts: {}, totalVotes: 0, updatedAt: null };
      const meta = payload && payload.meta
        ? payload.meta
        : { totalSubmissions: 0, lastVoteAt: null };
      const voteLog = Array.isArray(payload && payload.voteLog) ? payload.voteLog : [];
      const uniqueFingerprints = Number(payload && payload.uniqueFingerprints) || 0;
      const counts = results.counts || {};
      const totalVotes = Number(results.totalVotes) || 0;
      const orderedIds = Array.isArray(category.candidateIds) && category.candidateIds.length
        ? category.candidateIds
        : Object.keys(counts).map((id) => Number(id));

      const rows = orderedIds.map((id) => {
        const votes = Number(counts[id] || 0);
        const percent = totalVotes > 0 ? Math.round((votes / totalVotes) * 100) : 0;
        return `<tr>
          <td>${escapeHtml(candidateName(category, id))}</td>
          <td>${votes}</td>
          <td>${percent}%</td>
        </tr>`;
      }).join('');

      const logRows = voteLog.map((entry) => `<tr>
        <td>${escapeHtml(entry.timestamp || '-')}</td>
        <td>${escapeHtml(candidateName(category, entry.candidateId))}</td>
        <td>${escapeHtml(entry.voterName || '-')}</td>
        <td>${escapeHtml(entry.comment || '')}</td>
      </tr>`).join('');

      return `
        <div class="category-block ${escapeHtml(category.type || '')}">
          <h3>${escapeHtml(category.label)} <small style="color:#888;">[${escapeHtml(category.id)} / ${escapeHtml(category.type)}]</small></h3>
          <div class="meta-grid">
            <div><strong>Total votes:</strong> ${totalVotes}</div>
            <div><strong>Unique fingerprints:</strong> ${uniqueFingerprints}</div>
            <div><strong>Total submissions:</strong> ${Number(meta.totalSubmissions) || 0}</div>
            <div><strong>Updated at:</strong> ${escapeHtml(results.updatedAt || '-')}</div>
            <div><strong>Last vote at:</strong> ${escapeHtml(meta.lastVoteAt || '-')}</div>
          </div>
          <table>
            <thead>
              <tr>
                <th>Candidate</th>
                <th>Votes</th>
                <th>Percent</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="3" style="text-align:center;color:#888;">候補なし</td></tr>'}</tbody>
          </table>
          <details>
            <summary>Vote Log（${voteLog.length}件）</summary>
            <table>
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Candidate</th>
                  <th>Name</th>
                  <th>Comment</th>
                </tr>
              </thead>
              <tbody>${logRows || '<tr><td colspan="4" style="text-align:center;color:#888;">ログなし</td></tr>'}</tbody>
            </table>
          </details>
        </div>
      `;
    }

    function renderSnapshot(data) {
      configCache = data.config || { categories: [], teams: [], members: [] };

      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('voteStatus').textContent = data.status || '-';

      const categories = Array.isArray(configCache.categories) ? configCache.categories : [];
      const categoriesData = data.categories || {};
      document.getElementById('categoriesWrap').innerHTML = categories
        .map((category) => renderCategoryBlock(category, categoriesData[category.id]))
        .join('');

      const impressions = Array.isArray(data.eventImpressions) ? data.eventImpressions : [];
      document.getElementById('eventImpressionsBody').innerHTML = impressions.length
        ? impressions.map((entry) => `<tr>
            <td>${escapeHtml(entry.timestamp || '-')}</td>
            <td>${escapeHtml(entry.voterName || '-')}</td>
            <td>${escapeHtml(entry.comment || '')}</td>
          </tr>`).join('')
        : '<tr><td colspan="3" style="text-align:center;color:#888;">感想なし</td></tr>';
    }

    async function loadAdmin() {
      try {
        const data = await api('/api/admin/results');
        renderSnapshot(data);
        setStatus('読み込み完了');
      } catch (error) {
        if (/認証エラー|アクセスが拒否/.test(error.message)) {
          localStorage.removeItem('battlefes_admin_token');
          setLoggedInUi(false);
        }
        setStatus(error.message);
      }
    }

    async function resetVotes() {
      const confirmed = window.confirm('すべての投票データとログをリセットします。元に戻せません。よろしいですか？');
      if (!confirmed) return;

      try {
        const data = await api('/api/admin/reset', { method: 'POST' });
        renderSnapshot(data);
        setStatus('すべての投票をリセットしました');
      } catch (error) {
        setStatus(error.message);
      }
    }

    document.getElementById('adminToken').value = getToken();
    syncPasswordToggleUI(false);
    window.addEventListener('storage', (event) => {
      if (!event.key || event.key === TEST_MODE_KEY) refreshTestModeUI();
    });
    refreshTestModeUI();
  </script>
</body>
</html>
