<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>TEAM NOVA | Clip Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Ops+One&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/clip/team-clip.css">
</head>
<body style="--team-color:#7c3aff; --team-bg:url('/assets/teams/nova.png');">
  <main class="team-shell">
    <section class="clip-panel" aria-labelledby="team-title">
      <header class="team-head">
        <p class="team-num">TEAM 02</p>
        <h1 class="team-name" id="team-title">NOVA</h1>
        <span class="clip-label">TEAM CLIP</span>
      </header>

      <div class="member-grid">
        <a class="member-link" href="https://web.colorsing.com/share/user?user_id=b685e0ab-d7dc-4077-874d-e9cae3565681" target="_blank" rel="noopener noreferrer" aria-label="りんかのColorSingプロフィールを開く">
          <span class="avatar">
            <img src="/assets/members/nova-leader.jpg" alt="りんか">
            <span class="leader-badge">LEADER</span>
          </span>
          <span class="member-role">LEADER</span>
          <span class="member-name">りんか🔔</span>
          <span class="member-action">OPEN</span>
        </a>

        <a class="member-link" href="https://web.colorsing.com/share/user?user_id=97fff16b-5d16-4aed-ba37-6ab15df2ac61" target="_blank" rel="noopener noreferrer" aria-label="なぽるのColorSingプロフィールを開く">
          <span class="avatar">
            <img src="/assets/members/nova-naporu.jpg" alt="なぽる" style="object-fit: contain;">
          </span>
          <span class="member-role">MEMBER</span>
          <span class="member-name">なぽる</span>
          <span class="member-action">OPEN</span>
        </a>

        <a class="member-link" href="https://web.colorsing.com/share/user?user_id=ddba533b-8d21-4733-8cda-6764a6148fec" target="_blank" rel="noopener noreferrer" aria-label="犬飼音子(ねこ)のColorSingプロフィールを開く">
          <span class="avatar">
            <img src="/assets/members/nova-neko.jpg" alt="犬飼音子(ねこ)">
          </span>
          <span class="member-role">MEMBER</span>
          <span class="member-name">犬飼音子(ねこ)</span>
          <span class="member-action">OPEN</span>
        </a>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll('.member-link.is-pending').forEach((link) => {
      link.addEventListener('click', (event) => event.preventDefault());
    });
  </script>
</body>
</html>
