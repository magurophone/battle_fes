<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1500, initial-scale=1">
<title>BATTLE FES 2026 X Header</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dela+Gothic+One&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #050917;
    --paper: #fff8ee;
    --muted: #d8b98b;
    --orange: #ff7c1e;
    --yellow: #ffe040;
    --red: #ff3014;
    --crimson: #ff2d78;
    --nova: #7c3aff;
    --golden: #ffd700;
  }

  * { box-sizing: border-box; }
  html, body {
    width: 1500px;
    height: 500px;
    margin: 0;
    overflow: hidden;
    background: var(--ink);
  }
  body {
    color: var(--paper);
    font-family: "Noto Sans JP", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .header {
    position: relative;
    width: 1500px;
    height: 500px;
    isolation: isolate;
    overflow: hidden;
    background: #050917;
  }

  .photo,
  .shade,
  .grid,
  .grain,
  .heat,
  .ghost-type,
  .team-rail {
    position: absolute;
    pointer-events: none;
  }

  .photo {
    inset: 0;
    z-index: -5;
    background: url("/hero-bg.webp") center 48% / cover no-repeat;
    transform: scale(1.04);
    filter: saturate(1.06) contrast(1.06);
  }
  .shade {
    inset: 0;
    z-index: -4;
    background:
      radial-gradient(ellipse at 52% 48%, rgba(255,102,20,0.06) 0%, transparent 42%),
      linear-gradient(90deg, rgba(3,7,20,0.96) 0%, rgba(3,7,20,0.86) 34%, rgba(5,7,18,0.58) 63%, rgba(5,4,12,0.84) 100%),
      linear-gradient(180deg, rgba(2,5,16,0.50) 0%, transparent 38%, rgba(3,5,12,0.72) 100%);
  }
  .grid {
    inset: 0;
    z-index: -3;
    opacity: 0.22;
    background-image:
      linear-gradient(rgba(255,190,100,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,190,100,0.12) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: linear-gradient(90deg, rgba(0,0,0,0.6), transparent 68%);
  }
  .grain {
    inset: 0;
    z-index: 9;
    opacity: 0.20;
    mix-blend-mode: overlay;
    background: url("/assets/textures/grain-fine-dark.png") center / 560px auto repeat;
  }
  .heat {
    z-index: -2;
    left: 500px;
    top: -120px;
    width: 220px;
    height: 760px;
    transform: rotate(19deg);
    background: linear-gradient(90deg, transparent, rgba(255,94,20,0.26), rgba(255,224,64,0.12), transparent);
    filter: blur(20px);
  }
  .cut {
    position: absolute;
    z-index: 0;
    top: -80px;
    left: 605px;
    width: 2px;
    height: 660px;
    transform: rotate(19deg);
    transform-origin: center;
    background: linear-gradient(transparent, rgba(255,224,64,0.78) 18%, var(--orange) 54%, rgba(255,48,20,0.55) 82%, transparent);
    box-shadow: 0 0 22px rgba(255,103,26,0.65);
  }
  .cut::before,
  .cut::after {
    content: "";
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: rgba(255,248,238,0.16);
  }
  .cut::before { left: -10px; }
  .cut::after { right: -18px; }

  .ghost-type {
    z-index: -1;
    right: -14px;
    top: -46px;
    font-family: "Bebas Neue", sans-serif;
    font-size: 245px;
    line-height: 0.82;
    letter-spacing: 0.02em;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,244,225,0.075);
    transform: skewX(-8deg);
  }

  .brand {
    position: absolute;
    z-index: 2;
    left: 224px;
    top: 34px;
    width: 392px;
    height: 414px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .sublogo {
    width: 222px;
    height: auto;
    margin: 0 0 -3px;
    filter: drop-shadow(0 3px 12px rgba(0,0,0,0.72));
  }
  .logo {
    width: 388px;
    height: auto;
    filter:
      drop-shadow(0 18px 38px rgba(0,0,0,0.74))
      drop-shadow(0 0 32px rgba(255,86,20,0.34));
  }

  .info {
    position: absolute;
    z-index: 3;
    left: 683px;
    top: 54px;
    width: 700px;
    height: 392px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--yellow);
  }
  .eyebrow::before {
    content: "";
    width: 52px;
    height: 2px;
    background: linear-gradient(90deg, var(--red), var(--yellow));
    box-shadow: 0 0 14px rgba(255,124,30,0.55);
  }
  .event-date {
    margin-top: 7px;
    font-family: "Bebas Neue", sans-serif;
    font-size: 94px;
    line-height: 0.94;
    letter-spacing: 0.045em;
    color: #fff9ef;
    text-shadow: 0 3px 22px rgba(0,0,0,0.78), 0 0 46px rgba(255,112,24,0.16);
  }
  .event-meta {
    display: flex;
    align-items: stretch;
    margin-top: 12px;
    width: fit-content;
    border-top: 1px solid rgba(255,192,116,0.5);
    border-bottom: 1px solid rgba(255,192,116,0.26);
    background: linear-gradient(90deg, rgba(74,20,6,0.74), rgba(9,13,30,0.54));
    clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
  }
  .event-meta span {
    display: flex;
    align-items: center;
    min-height: 38px;
    padding: 0 22px;
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.13em;
    color: #ffe8c7;
    white-space: nowrap;
  }
  .event-meta span + span { border-left: 1px solid rgba(255,176,90,0.28); }
  .tagline {
    margin: 18px 0 0;
    font-family: "Dela Gothic One", "Noto Sans JP", sans-serif;
    font-size: 21px;
    line-height: 1.35;
    letter-spacing: 0.095em;
    color: var(--paper);
    text-shadow: 0 3px 16px rgba(0,0,0,0.82);
  }
  .tagline em {
    color: var(--yellow);
    font-style: normal;
  }

  .team-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 24px;
  }
  .team-label {
    padding-right: 18px;
    border-right: 1px solid rgba(255,224,180,0.28);
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    font-weight: 700;
    line-height: 1.55;
    letter-spacing: 0.17em;
    color: var(--muted);
  }
  .wordmarks {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .wordmarks img {
    display: block;
    width: auto;
    height: 25px;
    object-fit: contain;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.9));
  }
  .wordmarks .nova { height: 28px; }
  .versus {
    font-family: "Bebas Neue", sans-serif;
    font-size: 17px;
    letter-spacing: 0.08em;
    color: rgba(255,248,238,0.42);
  }

  .micro {
    position: absolute;
    z-index: 3;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,226,188,0.46);
  }
  .micro.top { top: 20px; right: 26px; }
  .micro.bottom { bottom: 21px; right: 26px; }

  .team-rail {
    z-index: 7;
    left: 0;
    right: 0;
    bottom: 0;
    height: 8px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }
  .team-rail span:nth-child(1) { background: var(--crimson); box-shadow: 0 -3px 22px rgba(255,45,120,0.6); }
  .team-rail span:nth-child(2) { background: var(--nova); box-shadow: 0 -3px 22px rgba(124,58,255,0.6); }
  .team-rail span:nth-child(3) { background: var(--golden); box-shadow: 0 -3px 22px rgba(255,215,0,0.6); }

  .safe-guide,
  .avatar-guide { display: none; position: absolute; z-index: 20; pointer-events: none; }
  body.show-guides .safe-guide,
  body.show-guides .avatar-guide { display: block; }
  .safe-guide {
    inset: 24px 80px;
    border: 2px dashed rgba(60,220,255,0.85);
  }
  .safe-guide::after {
    content: "X HEADER SAFE AREA";
    position: absolute;
    top: 5px;
    right: 8px;
    font: 700 10px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.12em;
    color: #70eaff;
  }
  .avatar-guide {
    left: 16px;
    bottom: -62px;
    width: 230px;
    height: 230px;
    border: 2px dashed rgba(255,70,100,0.92);
    border-radius: 50%;
    background: rgba(255,30,70,0.12);
  }
</style>
</head>
<body>
<main class="header" aria-label="BATTLE FES 2026 Xヘッダー">
  <div class="photo"></div>
  <div class="shade"></div>
  <div class="grid"></div>
  <div class="heat"></div>
  <div class="cut"></div>
  <div class="ghost-type" aria-hidden="true">BATTLE<br>2026</div>

  <section class="brand" aria-label="イベントロゴ">
    <img class="sublogo" src="/assets/logos/sublogo-colorsing-trim.png" alt="ColorSing Summer Event 2026">
    <img class="logo" src="/assets/logos/logo-B-trim.png" alt="BATTLE FES">
  </section>

  <section class="info" aria-label="開催情報">
    <div class="eyebrow">ONE NIGHT · THREE TEAMS · ONE CHAMPION</div>
    <div class="event-date">2026.07.18</div>
    <div class="event-meta">
      <span>SATURDAY</span>
      <span>19:45 START</span>
      <span>COLOR SING LIVE</span>
    </div>
    <p class="tagline">チーム対抗 <em>歌唱バトルフェスティバル</em></p>
    <div class="team-row">
      <div class="team-label">3 TEAMS<br>9 ARTISTS</div>
      <div class="wordmarks" aria-label="参加チーム">
        <img src="/assets/teams/wordmarks/crimson.png" alt="CRIMSON">
        <span class="versus">VS</span>
        <img class="nova" src="/assets/teams/wordmarks/nova.png" alt="NOVA">
        <span class="versus">VS</span>
        <img src="/assets/teams/wordmarks/golden.png" alt="GOLDEN">
      </div>
    </div>
  </section>

  <div class="micro top">BF26 // OFFICIAL EVENT HEADER // REV.01</div>
  <div class="micro bottom">LISTENER VOTE × INDIVIDUAL HONORS × LIVE SCORE</div>
  <div class="team-rail" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="grain"></div>
  <div class="safe-guide"></div>
  <div class="avatar-guide"></div>
</main>
<script>
  if (new URLSearchParams(location.search).has("guides")) {
    document.body.classList.add("show-guides");
  }
</script>
</body>
</html>
