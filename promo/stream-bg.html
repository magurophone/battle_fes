<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BATTLE FES 2026 当日配信背景</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dela+Gothic+One&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #fdf6ec;
    --accent2: #ffd83d;
  }

  * { box-sizing: border-box; }
  /* iPhone 17 縦画面ネイティブ解像度 1206×2622 */
  html, body {
    width: 1206px;
    height: 2622px;
    margin: 0;
    overflow: hidden;
    background: #050203;
  }
  body {
    color: var(--text);
    font-family: "Noto Sans JP", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .stage {
    position: relative;
    width: 1206px;
    height: 2622px;
    overflow: hidden;
    isolation: isolate;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .stage[hidden] { display: none; }

  /* サイトの .hero-bg と同じ写真背景 + 暗幕。配信で下に演者・コメントが乗るため暗めに振る */
  .bg {
    position: absolute;
    inset: 0;
    background: url("/hero-bg.webp") center 30% / cover no-repeat;
    z-index: -2;
  }
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(4, 7, 30, 0.52) 0%,
      rgba(4, 7, 30, 0.30) 34%,
      rgba(5, 2, 3, 0.72) 74%,
      rgba(5, 2, 3, 0.90) 100%
    );
  }

  /* サイトの .spotlight を静止画で再現 */
  .spot {
    position: absolute;
    bottom: -30px;
    width: 260px;
    height: 72%;
    border-radius: 50%;
    filter: blur(48px);
    transform-origin: bottom center;
    opacity: 0.6;
    z-index: -1;
    pointer-events: none;
  }
  .spot.l {
    left: 8%;
    background: linear-gradient(to top, rgba(255,160,30,0.6), rgba(255,200,80,0.22), transparent);
    transform: rotate(-18deg);
  }
  .spot.r {
    right: 8%;
    background: linear-gradient(to top, rgba(255,50,100,0.5), rgba(255,80,120,0.18), transparent);
    transform: rotate(18deg);
  }

  .firework {
    position: absolute;
    background: url("/assets/effects/firework.png") center / contain no-repeat;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: -1;
  }

  .sublogo {
    display: block;
    width: 300px;
    height: auto;
    margin: 0 auto 22px;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5));
  }
  .logo {
    display: block;
    height: auto;
    margin: 0 auto;
    filter: drop-shadow(0 18px 60px rgba(255,80,20,0.35)) drop-shadow(0 8px 30px rgba(0,0,0,0.6));
  }
  .tagline {
    font-family: "Dela Gothic One", "Noto Sans JP", sans-serif;
    font-size: 33px;
    letter-spacing: 0.12em;
    color: var(--text);
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  }

  /* サイトの .date-chip / .date-chip.hot と同意匠 */
  .chip {
    position: relative;
    display: inline-block;
    font-family: "Noto Sans JP", sans-serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: 0.1em;
    color: rgba(255,235,200,0.98);
    background:
      radial-gradient(ellipse at 50% 100%, rgba(255,140,40,0.35) 0%, transparent 75%),
      linear-gradient(rgba(28,12,5,0.6), rgba(12,5,3,0.75)),
      url("/assets/textures/marble-dark.png") center / cover no-repeat;
    border: 2px solid rgba(255,200,140,0.55);
    border-radius: 100px;
    padding: 22px 62px;
    text-shadow: 0 0 16px rgba(255,160,50,0.55), 0 1px 2px rgba(0,0,0,0.95);
    box-shadow:
      inset 0 1px 0 rgba(255,230,170,0.4),
      inset 0 -1px 0 rgba(0,0,0,0.45),
      0 6px 20px rgba(0,0,0,0.55),
      0 0 36px rgba(255,150,50,0.4);
  }
  .chip.hot {
    color: #ffeec0;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(255,90,30,0.55) 0%, rgba(255,50,40,0.15) 55%, transparent 85%),
      linear-gradient(rgba(70,20,8,0.65), rgba(28,8,4,0.82)),
      url("/assets/textures/marble-dark.png") center / cover no-repeat;
    border-color: rgba(255,170,80,0.95);
    text-shadow: 0 0 18px rgba(255,180,60,0.75), 0 1px 2px rgba(0,0,0,0.95);
    box-shadow:
      inset 0 1px 0 rgba(255,235,170,0.55),
      inset 0 -1px 0 rgba(0,0,0,0.45),
      0 6px 20px rgba(0,0,0,0.55),
      0 0 50px rgba(255,107,26,0.55);
  }
  .chip .sep {
    display: inline-block;
    width: 2px;
    height: 0.95em;
    margin: 0 26px;
    vertical-align: -0.12em;
    background: rgba(255,200,140,0.5);
  }
  .chip .en {
    font-family: "Bebas Neue", sans-serif;
    font-weight: 400;
    font-size: 0.94em;
    letter-spacing: 0.24em;
  }

  .kicker {
    font-family: "Bebas Neue", sans-serif;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    color: var(--accent2);
    text-transform: uppercase;
    text-shadow: 0 0 24px rgba(255,220,10,0.6), 0 2px 8px rgba(0,0,0,0.5);
  }

  /*
   * 配信UIの占有領域（避ける、見取り図の比率を 2622px 高に換算）:
   *   上部 0〜420px = アイコン / 視聴中 / 歌唱曲名
   *   1450px〜下端 = 歌詞バー + コメント欄
   * 情報・ロゴは y=420〜1450 の帯にのみ配置する。背景ははみ出してよい。
   */
  .safe {
    position: absolute;
    top: 445px;
    left: 0;
    right: 0;
    height: 980px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* ===== opening ===== */
  .opening .sublogo { width: 280px; margin-bottom: 18px; }
  .opening .logo { width: 580px; }
  .opening .tagline { margin-top: 40px; font-size: 39px; }
  .opening .chip { margin-top: 50px; font-size: 40px; padding: 24px 66px; }

  .wordmarks {
    margin-top: 56px;
    display: flex;
    align-items: center;
    gap: 38px;
  }
  .wordmarks img {
    height: 44px;
    width: auto;
    opacity: 0.72;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.8));
  }
  .wordmarks .vs {
    font-family: "Bebas Neue", sans-serif;
    font-size: 24px;
    letter-spacing: 0.14em;
    color: rgba(253,246,236,0.5);
    line-height: 1;
  }

  /* ===== result ===== */
  .result .logo { width: 560px; }
  .result .kicker {
    margin-top: 32px;
    font-size: 37px;
  }
  .result .headline {
    margin-top: 18px;
    font-family: "Dela Gothic One", "Noto Sans JP", sans-serif;
    font-size: 68px;
    line-height: 1.2;
    letter-spacing: 0.06em;
    color: var(--text);
    text-shadow: 0 4px 20px rgba(0,0,0,0.75), 0 0 60px rgba(255,120,30,0.35);
  }
  .result .chips {
    margin-top: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
  }
  .result .chip { font-size: 30px; padding: 18px 44px; }
  .result .cta {
    margin-top: 48px;
  }
  .result .cta .lead {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }
  .result .cta .url {
    margin-top: 18px;
    font-family: "JetBrains Mono", monospace;
    font-size: 44px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,216,61,0.5), 0 2px 10px rgba(0,0,0,0.8);
  }

  /* ?guides=1 で配信UI占有領域を可視化（検証用） */
  .guide {
    display: none;
    position: absolute;
    left: 0;
    right: 0;
    background: rgba(255, 0, 0, 0.32);
    outline: 2px dashed rgba(255, 0, 0, 0.8);
    z-index: 50;
    pointer-events: none;
  }
  body.show-guides .guide { display: block; }
  .guide.top { top: 0; height: 420px; }
  .guide.bottom { top: 1450px; bottom: 0; }
</style>
</head>
<body>

<section class="stage opening" data-scene="opening">
  <div class="bg"></div>
  <div class="spot l"></div>
  <div class="spot r"></div>
  <div class="safe">
    <img class="sublogo" src="/assets/logos/sublogo-colorsing-trim.png" alt="Colorsing Summer Event 2026">
    <img class="logo" src="/assets/logos/logo-B-trim.png" alt="BATTLE FES">
    <div class="tagline">チーム対抗 歌唱バトルフェスティバル</div>
    <div class="chip hot">開会式<span class="sep"></span><span class="en">OPENING CEREMONY</span></div>
    <div class="wordmarks">
      <img src="/assets/teams/wordmarks/crimson.png" alt="CRIMSON">
      <div class="vs">VS</div>
      <img src="/assets/teams/wordmarks/nova.png" alt="NOVA">
      <div class="vs">VS</div>
      <img src="/assets/teams/wordmarks/golden.png" alt="GOLDEN">
    </div>
  </div>
  <div class="guide top"></div>
  <div class="guide bottom"></div>
</section>

<section class="stage result" data-scene="result" hidden>
  <div class="bg"></div>
  <div class="spot l"></div>
  <div class="spot r"></div>
  <div class="firework" style="top: 40px; left: -110px; width: 460px; height: 460px; opacity: 0.75;"></div>
  <div class="firework" style="top: 210px; right: -130px; width: 400px; height: 400px; opacity: 0.6;"></div>
  <div class="safe">
    <img class="logo" src="/assets/logos/logo-B-trim.png" alt="BATTLE FES">
    <div class="kicker">Final Stage</div>
    <div class="headline">本投票・結果発表</div>
    <div class="chips">
      <div class="chip hot">本投票<span class="sep"></span>22:30 締切</div>
      <div class="chip">結果発表<span class="sep"></span>22:30〜</div>
    </div>
    <div class="cta">
      <div class="lead">投票は特設サイトから</div>
      <div class="url">battle-fes.pages.dev</div>
    </div>
  </div>
  <div class="guide top"></div>
  <div class="guide bottom"></div>
</section>

<script>
  const params = new URLSearchParams(location.search);
  const scene = params.get("scene") || "opening";
  for (const section of document.querySelectorAll(".stage")) {
    section.hidden = section.dataset.scene !== scene;
  }
  if (params.get("guides")) document.body.classList.add("show-guides");
</script>
</body>
</html>
