<!doctype html>
<html lang="ja" data-document-role="page" data-label="メインロゴ全比較">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BATTLE FES メインロゴ全比較</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Yu Gothic", "YuGothic", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #080611;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 2048px;
      height: 1152px;
      margin: 0;
      overflow: hidden;
    }

    body {
      color: #fffaf1;
      background:
        radial-gradient(circle at 88% 8%, rgba(255, 91, 22, .16), transparent 29%),
        radial-gradient(circle at 7% 92%, rgba(217, 18, 93, .10), transparent 34%),
        linear-gradient(116deg, #080713 0%, #0b0710 49%, #130707 100%);
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 68px 112px 58px;
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px);
      background-size: 82px 82px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 85%, transparent);
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: .26;
      mix-blend-mode: soft-light;
      background: url("../public/assets/textures/grain-fine-dark.png") center / cover;
      pointer-events: none;
    }

    .header {
      height: 188px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 40px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 18px;
      color: #ffd827;
      font-family: Impact, "Arial Narrow", sans-serif;
      font-size: 25px;
      letter-spacing: .35em;
      line-height: 1;
      text-transform: uppercase;
    }

    .eyebrow::after {
      content: "";
      width: 126px;
      height: 2px;
      background: linear-gradient(90deg, #ffd827, transparent);
    }

    h1 {
      margin: 0;
      font-family: Impact, "Arial Black", "Yu Gothic", sans-serif;
      font-size: 76px;
      font-weight: 900;
      letter-spacing: .045em;
      line-height: 1;
      text-shadow: 0 0 28px rgba(255, 216, 39, .08);
    }

    .header-meta {
      padding-top: 6px;
      text-align: right;
    }

    .header-meta strong {
      display: block;
      color: #d8b58a;
      font-family: Impact, "Arial Narrow", sans-serif;
      font-size: 30px;
      font-weight: 400;
      letter-spacing: .28em;
      line-height: 1;
    }

    .header-meta span {
      display: block;
      margin-top: 16px;
      color: rgba(255, 250, 241, .68);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .12em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(2, 360px);
      gap: 22px;
    }

    .card {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid rgba(202, 158, 93, .42);
      border-radius: 18px;
      background: #000;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .04),
        0 18px 42px rgba(0, 0, 0, .2);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 38%, rgba(255, 208, 130, .04) 50%, transparent 63%);
      pointer-events: none;
    }

    .card.final {
      border-color: rgba(255, 216, 39, .95);
      background:
        radial-gradient(circle at 50% 54%, rgba(255, 111, 13, .18), transparent 52%),
        linear-gradient(145deg, rgba(35, 22, 12, .97), rgba(8, 7, 10, .98));
      box-shadow:
        inset 0 0 0 1px rgba(255, 216, 39, .24),
        0 0 34px rgba(255, 121, 15, .12);
    }

    .label {
      position: absolute;
      top: 18px;
      left: 22px;
      z-index: 2;
      color: #c8a982;
      font-family: Impact, "Arial Narrow", sans-serif;
      font-size: 19px;
      letter-spacing: .23em;
      line-height: 1;
    }

    .final .label { color: #ffd827; }

    .badge {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 2;
      padding: 8px 13px 7px 15px;
      border-radius: 999px;
      color: #130b00;
      background: #ffd827;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .13em;
      line-height: 1;
    }

    .logo-wrap {
      position: absolute;
      inset: 48px 20px 14px;
      display: grid;
      place-items: center;
    }

    .logo-wrap img {
      display: block;
      width: 410px;
      height: 315px;
      object-fit: contain;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, .5));
      transform-origin: center;
    }

    .scale-086 { transform: scale(.86); }
    .scale-090 { transform: scale(.90); }

    .footer {
      height: 78px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      color: rgba(255, 250, 241, .72);
    }

    .footer-copy {
      font-size: 23px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .footer-copy em {
      color: #ffd827;
      font-style: normal;
    }

    .footer-mark {
      color: #a88b69;
      font-family: Impact, "Arial Narrow", sans-serif;
      font-size: 18px;
      letter-spacing: .28em;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <div class="eyebrow">BATTLE FES 開発裏話 05</div>
        <h1>メインロゴ全比較</h1>
      </div>
      <div class="header-meta">
        <strong>MAIN LOGO STUDIES</strong>
        <span>サイトの世界観に合う、ひとつを探して。</span>
      </div>
    </header>

    <section class="grid" aria-label="メインロゴ8案の比較">
      <article class="card">
        <span class="label">DESIGN 01</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/hqmkSRh9TRaqOeoWouCzog@1k.webp" alt="メインロゴ案1"></div>
      </article>
      <article class="card">
        <span class="label">DESIGN 02</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/hle_-P--QwCJ8v_oGdyaHg@2k.webp" alt="メインロゴ案2"></div>
      </article>
      <article class="card">
        <span class="label">DESIGN 03</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/7zZ0W_93QG68CyamhaAnJQ@2k.webp" alt="メインロゴ案3"></div>
      </article>
      <article class="card">
        <span class="label">DESIGN 04</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/v3WaLS27THqSH1C6zJfyEQ@2k.webp" alt="メインロゴ案4"></div>
      </article>
      <article class="card">
        <span class="label">DESIGN 05</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/xHsAIGDkTNuDXCH1yG6OCw@2k.webp" alt="メインロゴ案5"></div>
      </article>
      <article class="card">
        <span class="label">DESIGN 06</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/C08BDCC3-D076-43AE-A54C-E384129F691D.jpg" alt="メインロゴ案6"></div>
      </article>
      <article class="card">
        <span class="label">DESIGN 07</span>
        <div class="logo-wrap"><img class="scale-090" src="../logo比較/DA9C7C1E-3DD0-4FFB-8EBA-DF7E6E0C32E2.jpg" alt="メインロゴ案7"></div>
      </article>
      <article class="card final">
        <span class="label">FINAL DESIGN</span>
        <span class="badge">採用</span>
        <div class="logo-wrap"><img class="scale-086" src="../logo比較/logo-B-trim.png" alt="採用された現在のメインロゴ"></div>
      </article>
    </section>

    <footer class="footer">
      <div class="footer-copy">単体の格好よさだけでなく、<em>サイトに置いたときの見え方</em>まで吟味。</div>
      <div class="footer-mark">8 DESIGNS / ONE FINAL MARK</div>
    </footer>
  </main>
</body>
</html>
