<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BATTLE FES 2026 前夜対談</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dela+Gothic+One&family=JetBrains+Mono:wght@600;700;800&family=Noto+Sans+JP:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: "Black Ops One Local";
    src: url("/assets/fonts/BlackOpsOne-Regular.ttf") format("truetype");
    font-display: block;
  }

  :root {
    --ink: #fff8eb;
    --gold: #ffd96d;
    --gold-deep: #b56b19;
    --crimson: #ff2d78;
    --nova: #7b45ff;
    --golden: #ffd400;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    height: 100%;
    min-height: 100%;
    margin: 0;
    overflow: hidden;
    background: #03040c;
  }

  body {
    display: grid;
    place-items: center;
    color: var(--ink);
    font-family: "Noto Sans JP", "Yu Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .preview-shell {
    position: relative;
    width: 1600px;
    height: 900px;
    flex: none;
  }

  .poster {
    position: absolute;
    inset: 0;
    width: 1600px;
    height: 900px;
    overflow: hidden;
    isolation: isolate;
    background: #070712;
    transform-origin: 0 0;
  }

  .venue {
    position: absolute;
    inset: -26px;
    z-index: -6;
    background: url("/hero-bg.webp") center 48% / cover no-repeat;
    filter: saturate(1.12) contrast(1.04);
  }

  .poster::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -5;
    background:
      linear-gradient(180deg, rgba(3, 5, 15, 0.68) 0%, rgba(5, 3, 11, 0.35) 32%, rgba(8, 2, 9, 0.72) 70%, #08020a 100%),
      radial-gradient(ellipse at 50% 48%, transparent 24%, rgba(0, 0, 0, 0.58) 83%),
      linear-gradient(90deg, rgba(7, 16, 37, 0.54), transparent 28%, transparent 72%, rgba(45, 6, 16, 0.5));
  }

  .poster::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.032) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px),
      url("/assets/textures/grain-fine-dark.png");
    background-size: 40px 40px, 40px 40px, cover;
    background-position: center;
    opacity: 0.22;
    mix-blend-mode: soft-light;
  }

  .light-beam {
    position: absolute;
    top: 32px;
    width: 420px;
    height: 650px;
    z-index: -3;
    opacity: 0.2;
    filter: blur(3px);
    clip-path: polygon(48% 0, 54% 0, 100% 100%, 0 100%);
  }
  .light-beam.left {
    left: 75px;
    background: linear-gradient(180deg, rgba(255, 217, 109, 0.9), transparent 76%);
    transform: rotate(-8deg);
  }
  .light-beam.right {
    right: 50px;
    background: linear-gradient(180deg, rgba(123, 69, 255, 0.94), transparent 76%);
    transform: rotate(9deg);
  }

  .firework {
    position: absolute;
    z-index: -2;
    width: 245px;
    opacity: 0.54;
    filter: sepia(0.18) saturate(1.12) drop-shadow(0 0 18px rgba(255, 137, 50, 0.54));
  }
  .firework.left { left: -48px; top: 82px; transform: rotate(-10deg); }
  .firework.right { right: -45px; top: 76px; transform: rotate(13deg); }

  .topline {
    position: absolute;
    inset: 0 0 auto;
    height: 112px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: start;
    padding: 27px 48px 0;
    z-index: 12;
  }

  .colorsing-logo {
    width: 250px;
    height: auto;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.8));
  }

  .series-label {
    align-self: center;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 16px;
    color: rgba(255, 226, 168, 0.88);
    font: 700 15px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.28em;
  }
  .series-label::before,
  .series-label::after {
    content: "";
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 210, 122, 0.74));
  }
  .series-label::after { transform: scaleX(-1); }

  .date-box {
    justify-self: end;
    min-width: 196px;
    padding: 12px 16px 11px;
    border: 1px solid rgba(255, 210, 122, 0.45);
    background: rgba(5, 3, 8, 0.74);
    box-shadow: inset 0 0 0 3px rgba(0,0,0,0.46), 0 0 30px rgba(255, 113, 32, 0.13);
    text-align: center;
  }
  .date-box strong {
    display: block;
    color: var(--gold);
    font: 800 23px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.13em;
  }
  .date-box span {
    display: block;
    margin-top: 7px;
    color: rgba(255, 239, 211, 0.64);
    font: 700 10px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.28em;
  }

  .headline {
    position: absolute;
    left: 126px;
    right: 126px;
    top: 105px;
    z-index: 11;
    display: grid;
    grid-template-columns: 330px 1fr;
    gap: 38px;
    align-items: center;
  }

  .battle-logo {
    width: 314px;
    height: 238px;
    object-fit: contain;
    filter: drop-shadow(0 9px 20px rgba(0,0,0,0.92)) drop-shadow(0 0 22px rgba(244, 104, 25, 0.26));
  }

  .title-block {
    padding-left: 39px;
    border-left: 1px solid rgba(255, 210, 122, 0.36);
  }
  .title-kicker {
    display: flex;
    align-items: center;
    gap: 16px;
    color: var(--gold);
    font: 800 16px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.32em;
  }
  .title-kicker::before {
    content: "";
    width: 46px;
    height: 4px;
    background: linear-gradient(90deg, #ff5d1f, var(--gold));
    box-shadow: 0 0 16px rgba(255, 111, 31, 0.72);
  }

  h1 {
    margin: 9px 0 5px;
    font-family: "Dela Gothic One", "Yu Gothic", sans-serif;
    font-size: 94px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.02em;
    color: transparent;
    background: linear-gradient(180deg, #fff9dc 0%, #ffe691 48%, #c88328 88%, #7c4213 100%);
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 6px 5px rgba(0,0,0,0.9)) drop-shadow(0 0 18px rgba(255, 151, 48, 0.3));
    white-space: nowrap;
  }

  .headline-copy {
    margin: 0;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.035em;
    color: rgba(255, 248, 234, 0.94);
    text-shadow: 0 3px 12px #000;
  }
  .headline-copy em {
    color: var(--gold);
    font-style: normal;
  }

  .leader-grid {
    position: absolute;
    left: 116px;
    right: 116px;
    top: 350px;
    height: 375px;
    z-index: 10;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .leader-card {
    --team: var(--golden);
    position: relative;
    min-width: 0;
    overflow: hidden;
    clip-path: polygon(24px 0, 100% 0, 100% calc(100% - 24px), calc(100% - 24px) 100%, 0 100%, 0 24px);
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--team) 16%, rgba(11,7,18,0.92)) 0%, rgba(6,4,10,0.9) 60%, rgba(3,2,5,0.98) 100%);
    border-top: 2px solid color-mix(in srgb, var(--team) 82%, white 18%);
    box-shadow: 0 28px 55px rgba(0,0,0,0.58);
  }
  .leader-card::before {
    content: "";
    position: absolute;
    inset: 12px;
    z-index: 0;
    border: 1px solid color-mix(in srgb, var(--team) 35%, transparent);
    clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
  }
  .leader-card::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 8px;
    z-index: 8;
    background: var(--team);
    box-shadow: 0 -5px 28px color-mix(in srgb, var(--team) 65%, transparent);
  }

  .leader-card.golden { --team: var(--golden); }
  .leader-card.crimson { --team: var(--crimson); }
  .leader-card.nova { --team: var(--nova); }

  .leader-meta {
    position: absolute;
    top: 25px;
    left: 27px;
    z-index: 5;
  }
  .leader-meta span {
    display: block;
    color: rgba(255, 238, 207, 0.68);
    font: 800 11px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.26em;
  }
  .leader-meta img {
    display: block;
    width: 155px;
    height: 34px;
    margin-top: 7px;
    object-fit: contain;
    object-position: left center;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.88));
  }

  .portrait-frame {
    position: absolute;
    left: 50%;
    top: 69px;
    width: 225px;
    height: 225px;
    z-index: 4;
    transform: translateX(-50%);
    overflow: hidden;
    padding: 6px;
    background: linear-gradient(135deg, #fff9d7 0%, var(--team) 28%, #4a2a0c 70%, var(--team) 100%);
    clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
    box-shadow:
      0 0 0 8px rgba(0,0,0,0.58),
      0 0 0 9px color-mix(in srgb, var(--team) 43%, transparent),
      0 0 44px color-mix(in srgb, var(--team) 50%, transparent),
      0 18px 32px rgba(0,0,0,0.8);
  }
  .portrait-frame img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #0a0710;
  }
  .golden .portrait-frame img { object-position: 50% 44%; }
  .crimson .portrait-frame img { object-position: center; }
  .nova .portrait-frame img { object-position: 50% 43%; }

  .nameplate {
    position: absolute;
    left: 26px;
    right: 26px;
    bottom: 26px;
    z-index: 7;
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: end;
    gap: 15px;
    padding: 8px 12px 10px 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.88), rgba(0,0,0,0.56), transparent);
  }
  .nameplate b {
    align-self: center;
    padding: 7px 9px;
    color: var(--team);
    border-left: 3px solid var(--team);
    font: 400 17px/1 "Black Ops One Local", sans-serif;
    letter-spacing: 0.12em;
    writing-mode: vertical-rl;
  }
  .nameplate strong {
    display: block;
    min-width: 0;
    color: white;
    font-size: 31px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: 0.015em;
    text-shadow: 0 4px 12px #000;
    white-space: nowrap;
  }
  .nameplate span {
    display: block;
    margin-top: 5px;
    color: color-mix(in srgb, var(--team) 78%, white 22%);
    font: 800 11px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.22em;
  }

  .broadcast {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 156px;
    z-index: 20;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 32px;
    padding: 0 82px;
    background:
      linear-gradient(90deg, rgba(6,7,17,0.98), rgba(30,5,12,0.97) 52%, rgba(8,4,9,0.98)),
      url("/assets/textures/marble-dark.png") center / cover no-repeat;
    border-top: 1px solid rgba(255, 219, 148, 0.4);
    box-shadow: 0 -18px 48px rgba(0,0,0,0.66), inset 0 5px 0 rgba(0,0,0,0.5);
  }
  .broadcast::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: -5px;
    height: 4px;
    background: linear-gradient(90deg, var(--golden) 0 33.333%, var(--crimson) 33.333% 66.666%, var(--nova) 66.666%);
    box-shadow: 0 0 20px rgba(255, 115, 40, 0.5);
  }
  .broadcast-kicker {
    color: rgba(255, 240, 216, 0.86);
    font: 900 34px/1 "Dela Gothic One", "Yu Gothic", sans-serif;
    white-space: nowrap;
  }
  .broadcast-time {
    display: flex;
    align-items: baseline;
    gap: 18px;
    min-width: 0;
  }
  .broadcast-time strong {
    color: transparent;
    background: linear-gradient(180deg, #fff9a9 0%, #ffd400 48%, #ff8a00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    font: 400 96px/0.85 "Black Ops One Local", sans-serif;
    letter-spacing: -0.035em;
    filter: drop-shadow(0 5px 8px #000) drop-shadow(0 0 16px rgba(255, 194, 42, 0.38));
  }
  .broadcast-time span {
    color: #fff8e9;
    font: 400 40px/1 "Black Ops One Local", sans-serif;
    letter-spacing: 0.09em;
  }
  .broadcast-note {
    max-width: 340px;
    padding-left: 26px;
    border-left: 1px solid rgba(255, 225, 172, 0.3);
    color: rgba(255, 236, 207, 0.78);
    font-size: 17px;
    font-weight: 800;
    line-height: 1.7;
    letter-spacing: 0.03em;
  }

  @media (max-width: 1599px), (max-height: 899px) {
    .preview-shell {
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
    }
  }
</style>
</head>
<body>
<main class="preview-shell" aria-label="BATTLE FES 2026 前夜対談 告知画像">
  <article class="poster">
    <div class="venue" aria-hidden="true"></div>
    <div class="light-beam left" aria-hidden="true"></div>
    <div class="light-beam right" aria-hidden="true"></div>
    <img class="firework left" src="/assets/effects/firework.png" alt="" aria-hidden="true">
    <img class="firework right" src="/assets/effects/firework.png" alt="" aria-hidden="true">

    <header class="topline">
      <img class="colorsing-logo" src="/assets/logos/sublogo-colorsing-trim.png" alt="Colorsing Summer Event 2026">
      <div class="series-label">OFFICIAL SPECIAL TALK</div>
      <div class="date-box"><strong>07.17 FRI</strong><span>BATTLE EVE</span></div>
    </header>

    <section class="headline">
      <img class="battle-logo" src="/assets/logos/logo-B-trim.png" alt="BATTLE FES">
      <div class="title-block">
        <div class="title-kicker">LEADERS' ROUND TABLE</div>
        <h1>前夜対談</h1>
        <p class="headline-copy"><em>3チームのリーダー</em>が語る、見どころ・裏話・明日への意気込み。</p>
      </div>
    </section>

    <section class="leader-grid" aria-label="出演リーダー">
      <article class="leader-card golden">
        <div class="leader-meta"><span>TEAM 03</span><img src="/assets/teams/wordmarks/golden.svg" alt="GOLDEN"></div>
        <div class="portrait-frame"><img src="/assets/members/golden-iran-july.jpg" alt="iran痔"></div>
        <div class="nameplate"><b>LEADER</b><div><strong>iran痔</strong><span>TEAM GOLDEN</span></div></div>
      </article>

      <article class="leader-card crimson">
        <div class="leader-meta"><span>TEAM 01</span><img src="/assets/teams/wordmarks/crimson.svg" alt="CRIMSON"></div>
        <div class="portrait-frame"><img src="/assets/members/crimson-leader.png" alt="まぐろふぉん"></div>
        <div class="nameplate"><b>LEADER</b><div><strong>まぐろふぉん</strong><span>TEAM CRIMSON</span></div></div>
      </article>

      <article class="leader-card nova">
        <div class="leader-meta"><span>TEAM 02</span><img src="/assets/teams/wordmarks/nova.svg" alt="NOVA"></div>
        <div class="portrait-frame"><img src="/assets/members/nova-leader.jpg" alt="りんか"></div>
        <div class="nameplate"><b>LEADER</b><div><strong>りんか</strong><span>TEAM NOVA</span></div></div>
      </article>

    </section>

    <footer class="broadcast">
      <div class="broadcast-kicker">本日</div>
      <div class="broadcast-time"><strong>23:00</strong><span>START</span></div>
      <div class="broadcast-note">明日のBATTLE FESをもっと楽しむための、前夜スペシャルトーク。</div>
    </footer>
  </article>
</main>

<script>
  function fitPoster() {
    const shell = document.querySelector('.preview-shell');
    const poster = document.querySelector('.poster');
    const scale = Math.min(shell.clientWidth / 1600, shell.clientHeight / 900);
    poster.style.transform = `scale(${scale})`;
  }
  fitPoster();
  addEventListener('resize', fitPoster);
</script>
</body>
</html>
